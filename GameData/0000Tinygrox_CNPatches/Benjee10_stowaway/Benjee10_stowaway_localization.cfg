@PART[Benjee10_stowaway_Pod]:FOR[Benjee10Stowaway]
{
    @title = #Benjee10Stowaway_Pod_title
    @manufacturer = #Benjee10Stowaway_Pod_manufacturer
    @description = #Benjee10Stowaway_Pod_description
}

@PART[Benjee10_stowaway_NoseCone]:FOR[Benjee10Stowaway]
{
    @title = #Benjee10Stowaway_NoseCone_title
    @manufacturer = #Benjee10Stowaway_NoseCone_manufacturer
    @description = #Benjee10Stowaway_NoseCone_description
    
    @MODULE[ModuleAnimateGeneric]
    {
        @startEventGUIName = #Benjee10Stowaway_NoseCone_startEventGUIName
        @endEventGUIName = #Benjee10Stowaway_NoseCone_endEventGUIName
        @actionGUIName = #Benjee10Stowaway_NoseCone_actionGUIName
    }
}

