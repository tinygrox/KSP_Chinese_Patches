{
    zh-ch
	{	#autoLOC_KOOSE0001 = Eskape Kapsule Pty Ltd
		#autoLOC_KOOSE0002 = 一家成立多年的老牌公司，由两家泻药制造商合并而成。他们生产泻药胶囊已超过一个世纪，但在过去几十年里，因公司名称引起的混淆，业务逐渐拓展至救生艇和太空舱领域。
		#autoLOC_KOOSE0003 = KOOSE 隔热罩
		#autoLOC_KOOSE0004 = 坎巴拉轨道操作安全设备中“我不想被烧死”的核心部件。安装在返回舱底部。默认配备的高科技纳米烧蚀层（也就是软木）足以应对近地轨道返回。如需应对更剧烈的再入剖面，可订购额外烧蚀层的版本。
		#autoLOC_KOOSE0005 = KOOSE 降落伞
		#autoLOC_KOOSE0006 = 这个小型的降落伞单元安装在坎巴拉轨道操作安全设备的顶部，在旅程的最后阶段为您提供减速。
		#autoLOC_KOOSE0007 = KOOSE 返回舱
		#autoLOC_KOOSE0008 = 最初计划命名为“经济型坎巴拉太空出舱设备”，后来更名为坎巴拉轨道操作安全设备。该返回舱是供一名坎巴拉宇航员使用的微型再入飞行器。配备四个小型固体助推器作为离轨装置。配有姿控系统，必要时可用于增加离轨速度。内置小型无线电信标无需额外付费。请配合配套隔热罩和降落伞单元使用以维持保修有效。
		#autoLOC_KOOSE0009 = KOOSE 巢式发射架
		#autoLOC_KOOSE0010 = 一个2.5米级部件，可容纳六个KOOSE返回舱。技术上不具备对接能力，仅支持分离。
		#autoLOC_KOOSE0011 = KOOSE 单巢式发射架
		#autoLOC_KOOSE0012 = 一个可表面安装的分离节点，用于安装KOOSE返回舱。
		#autoLOC_KOOSE0013 = 坎巴拉宇航员应急救生艇
		#autoLOC_KOOSE0014 = 这是一种背包式充气再入防护罩。离轨需依靠喷气背包推力或预先进行的轨道机动完成，不附带降落伞。装备并充气后，通过一层烧蚀材料提供足够的再入热防护，使乘员能够承受减速至亚音速的过程。当速度与高度降至足够低时，即可展开宇航员自带的个人降落伞。降落伞需另行购买。

	}
}   