Localization
{
	en-us
	{
		// Bumblebee Parts localization
		// Aeroshell
		#autoLOC_bumblebee_bb_Aeroshell_title = Bumblebee "Apiary" Aeroshell
		#autoLOC_bumblebee_bb_Aeroshell_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Aeroshell_description = An aerodynamic cover to protect the probe inside during reentry. Has an attach node for a transfer/deorbit stage, and one for the Bumblebee Main Parachute both at the top (the chute will automaticly snap to the correct one), the decoupler on the inside, and a standard 2.5m heat shield on the underside (enable heat shield jettison on the heat shield).
		
		// Chute
		#autoLOC_bumblebee_bb_Chute_title = Bumblebee Main Parachute
		#autoLOC_bumblebee_bb_Chute_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Chute_description = The main parachute for the Bumblebee reentry system. Place on the top node of the aeroshell, and then place the drogue chute inside this. The drogue will be ejected on deploy. Can also be surface attached to a standard service bay, or other flat surface.
		
		// Core
		#autoLOC_bumblebee_bb_Core_title = Bumblebee Drone Probe Core
		#autoLOC_bumblebee_bb_Core_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Core_description = Designed for atmospheric flight on the larger moons of the outer system, this large probe core contains a powerful reaction wheel, a deployable seismometer, and a deployable sensor package.
		
		// Decoupler
		#autoLOC_bumblebee_bb_Decoupler_title = Bumblebee Decoupler
		#autoLOC_bumblebee_bb_Decoupler_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Decoupler_description = 0.625m Truss decoupler for the Bumblebee core, attaches to the top of the core, and allows attachment of an extra part (such as the sensor package or seismometer). Includes a toggleable cosmetic cover.
		
		// Drogue
		#autoLOC_bumblebee_bb_Drogue_title = Bumblebee Drogue Parachute
		#autoLOC_bumblebee_bb_Drogue_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Drogue_description = A high-speed drogue chute for the Bumblebee reentry system. Attach to the node inside the aeroshell, and deploy before the main chute to stabilize the probe.
		
		// HGA
		#autoLOC_bumblebee_bb_HGA_title = Bumblebee "Antennae" High Gain Antenna
		#autoLOC_bumblebee_bb_HGA_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_HGA_description = The high gain phased array antenna for the Bumblebee drone allows direct communication with Kerbin without the need for a relay satellite.
		
		// Prop
		#autoLOC_bumblebee_bb_Prop_title = Bumblebee "Wings" Contra-Propeller
		#autoLOC_bumblebee_bb_Prop_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Prop_description = Designed to lift the fairly heavy (by drone standards) Bumblebee on low gravity moons with high density atmospheres. Uses intake air as propellant, and has a toggleable cosmetic cover.
		
		// PropSingle
		#autoLOC_bumblebee_bb_PropSingle_title = Bumblebee "Wing" Single Propeller
		#autoLOC_bumblebee_bb_PropSingle_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_PropSingle_description = A single propeller version of the Bumblebee propeller, for when you only need about half the lift. Uses intake air as propellant, and has a toggleable cosmetic cover.
		
		// RTG
		#autoLOC_bumblebee_bb_RTG_title = Bumblebee "Stinger" RTG
		#autoLOC_bumblebee_bb_RTG_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_RTG_description = The "Stinger" RTG is the source of all the Bumblebee's power. While not able to provide enough electricity to run all the props at once, it can slowly charge the batteries while inactive.
		
		// Seismometer
		#autoLOC_bumblebee_bb_Seismometer_title = Bumblebee "Proboscis" Deployable Seismometer
		#autoLOC_bumblebee_bb_Seismometer_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Seismometer_description = Placed on the underside of the Bumblebee core, this small seismometer is lowered to the ground to measure seismic activity.
		
		// Sensor
		#autoLOC_bumblebee_bb_Sensor_title = Bumblebee Sensor Package
		#autoLOC_bumblebee_bb_Sensor_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Sensor_description = Contains various sensors to gather data from the Bumblebee's surroundings. Placed on the top of the core, and includes a toggleable cosmetic cover.
		
		// SingleTruss
		#autoLOC_bumblebee_bb_SingleTruss_title = Bumblebee single-mount Truss
		#autoLOC_bumblebee_bb_SingleTruss_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_SingleTruss_description = Lightweight truss designed to allow attachment of Bumblebee propellers onto almost anything you want. Has a toggleable cosmetic cover.
		
		// Skids
		#autoLOC_bumblebee_bb_Skids_title = Bumblebee "Knees" Skids
		#autoLOC_bumblebee_bb_Skids_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Skids_description = Landing skids for the Bumblebee drone. Includes sample-collecting drills with deployable drill bits for gathering surface samples.
		
		// Truss
		#autoLOC_bumblebee_bb_Truss_title = Bumblebee Truss
		#autoLOC_bumblebee_bb_Truss_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Truss_description = Lightweight truss for mounting the Bumblebee contra-props to the core. Has various toggleable cosmetic cover options.
		
		// DunaRotor (bb_Dunaprop)
		#autoLOC_bumblebee_bb_Dunaprop_title = "Dragonfly" Low Density Contra-Propeller
		#autoLOC_bumblebee_bb_Dunaprop_manufacturer = Hummingbird RC Models and Drones
		#autoLOC_bumblebee_bb_Dunaprop_description = Designed for use in low ambiant pressure and density enviroments where other propellers don't dare to tread! Seems to go well with red. Can use hover controls to to keep craft at a fixed vertical speed.
	}
}