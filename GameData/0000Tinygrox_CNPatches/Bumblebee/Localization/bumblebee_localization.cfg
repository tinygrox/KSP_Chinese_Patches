// Bumblebee  Localization Patch
// This patch localizes title, manufacturer, and description for all Bumblebee parts.
// Requires Module Manager.

@PART[bb_Aeroshell]:FOR[Bumblebee]
{
    @title = #autoLOC_bumblebee_bb_Aeroshell_title
    @manufacturer = #autoLOC_bumblebee_bb_Aeroshell_manufacturer
    @description = #autoLOC_bumblebee_bb_Aeroshell_description
}

