Localization
{
	zh-cn
	{
		// Bumblebee Parts localization
		// Aeroshell
		#autoLOC_bumblebee_bb_Aeroshell_title = Bumblebee "蜂巢"气动外壳
		#autoLOC_bumblebee_bb_Aeroshell_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Aeroshell_description = 一个气动外壳，用于在再入过程中保护内部的探测器。顶部有一个用于转移/离轨级的连接节点，以及一个用于Bumblebee主降落伞的节点（降落伞会自动吸附到正确的节点上），内部有一个分离器，底部有一个标准的2.5米防热盾（在防热盾上启用防热盾抛离功能）。
		
		// Chute
		#autoLOC_bumblebee_bb_Chute_title = Bumblebee主降落伞
		#autoLOC_bumblebee_bb_Chute_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Chute_description = Bumblebee再入系统的主降落伞。放置在气动外壳的顶部节点上，然后将减速伞放在里面。减速伞在展开时会被弹射出去。也可以表面安装到标准服务舱或其他平坦表面上。
		
		// Core
		#autoLOC_bumblebee_bb_Core_title = Bumblebee无人机探测核心
		#autoLOC_bumblebee_bb_Core_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Core_description = 专为外行星系统较大卫星的大气飞行而设计，这个大型探测核心包含一个强大的动量轮、一个可展开的地震仪和一个可展开的传感器包。
		
		// Decoupler
		#autoLOC_bumblebee_bb_Decoupler_title = Bumblebee分离器
		#autoLOC_bumblebee_bb_Decoupler_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Decoupler_description = 0.625米桁架分离器，用于Bumblebee核心，连接到核心顶部，并允许连接一个额外的部件（如传感器包或地震仪）。包含一个可切换的装饰盖。
		
		// Drogue
		#autoLOC_bumblebee_bb_Drogue_title = Bumblebee减速伞
		#autoLOC_bumblebee_bb_Drogue_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Drogue_description = Bumblebee再入系统的高速减速伞。连接到气动外壳内部的节点上，并在主降落伞展开之前展开以稳定探测器。
		
		// HGA
		#autoLOC_bumblebee_bb_HGA_title = Bumblebee "触角"高增益天线
		#autoLOC_bumblebee_bb_HGA_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_HGA_description = Bumblebee无人机的高增益相控阵天线，允许与Kerbin进行直接通信，无需中继卫星。
		
		// Prop
		#autoLOC_bumblebee_bb_Prop_title = Bumblebee "翅膀"对转螺旋桨
		#autoLOC_bumblebee_bb_Prop_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Prop_description = 专为在低重力、高密度大气卫星上提升相当重（以无人机标准）的Bumblebee而设计。使用intakeair作为推进剂，并具有可切换的装饰盖。
		
		// PropSingle
		#autoLOC_bumblebee_bb_PropSingle_title = Bumblebee "翅膀"单螺旋桨
		#autoLOC_bumblebee_bb_PropSingle_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_PropSingle_description = Bumblebee螺旋桨的单螺旋桨版本，当您只需要大约一半的升力时使用。使用intakeair作为推进剂，并具有可切换的装饰盖。
		
		// RTG
		#autoLOC_bumblebee_bb_RTG_title = Bumblebee "刺针"RTG
		#autoLOC_bumblebee_bb_RTG_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_RTG_description = "刺针"RTG是Bumblebee所有能量的来源。虽然无法提供足够的电力来同时运行所有螺旋桨，但它可以在不活动时缓慢地为电池充电。
		
		// Seismometer
		#autoLOC_bumblebee_bb_Seismometer_title = Bumblebee "口器"可展开地震仪
		#autoLOC_bumblebee_bb_Seismometer_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Seismometer_description = 放置在Bumblebee核心的底部，这个小地震仪被降低到地面以测量地震活动。
		
		// Sensor
		#autoLOC_bumblebee_bb_Sensor_title = Bumblebee传感器包
		#autoLOC_bumblebee_bb_Sensor_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Sensor_description = 包含各种传感器，用于从Bumblebee周围环境收集数据。放置在核心顶部，并包含一个可切换的装饰盖。
		
		// SingleTruss
		#autoLOC_bumblebee_bb_SingleTruss_title = Bumblebee单安装桁架
		#autoLOC_bumblebee_bb_SingleTruss_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_SingleTruss_description = 轻质桁架，设计用于将Bumblebee螺旋桨安装到几乎任何您想要的东西上。具有可切换的装饰盖。
		
		// Skids
		#autoLOC_bumblebee_bb_Skids_title = Bumblebee "膝盖"滑橇
		#autoLOC_bumblebee_bb_Skids_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Skids_description = Bumblebee无人机的着陆滑橇。包括带有可展开钻头的样本收集钻头，用于收集表面样本。
		
		// Truss
		#autoLOC_bumblebee_bb_Truss_title = Bumblebee桁架
		#autoLOC_bumblebee_bb_Truss_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Truss_description = 用于将Bumblebee对转螺旋桨安装到核心上的轻质桁架。具有各种可切换的装饰盖选项。
		
		// DunaRotor (bb_Dunaprop)
		#autoLOC_bumblebee_bb_Dunaprop_title = "蜻蜓"低密度对转螺旋桨
		#autoLOC_bumblebee_bb_Dunaprop_manufacturer = 蜂鸟RC模型与无人机公司
		#autoLOC_bumblebee_bb_Dunaprop_description = 专为在其他螺旋桨不敢涉足的低大气压和密度环境中使用而设计，似乎与红色很搭配。可以使用悬停控制来保持飞行器以固定的垂直速度飞行。
	}
}