	{
		// 热核喷管 (Thermal nozzle)
		#LOC_strl_eng_062_thnozbell_title = 斯特林 TN-DL 0.625m 热核钟形喷管
		#LOC_strl_eng_062_thnozbell_desc = 我们最可靠的新伙伴。这种经过真空优化的拉伐尔 (DeLaval) 喷管可以安装在任何兼容的核反应堆上，将热量直接传递给选定的推进剂。它在减少活动部件的同时，提供了令人赞叹的高比冲与巨大推力。当然，它在母星的海平面表现也同样出色。
		#LOC_strl_eng_125_thnozbell_title = 斯特林 TN-DL 1.25m 热核钟形喷管
		#LOC_strl_eng_125_thnozbell_desc = 我们最可靠的新伙伴。这种经过真空优化的拉伐尔 (DeLaval) 喷管可以安装在任何兼容的核反应堆上，将热量直接传递给选定的推进剂。它在减少活动部件的同时，提供了令人赞叹的高比冲与巨大推力。当然，它在母星的海平面表现也同样出色。
		#LOC_strl_eng_250_thnozbell_title = 斯特林 TN-DL 2.5m 热核钟形喷管
		#LOC_strl_eng_250_thnozbell_desc = 这种威武的拉伐尔喷管是专为那些比起在大气层内起步、更需要在真空环境下大显身手的舰船准备的。其喉部直径与较小尺寸的型号相同，因此推力虽稍逊一筹，但针对其尺寸拥有更好的膨胀比。
		#LOC_strl_eng_thnozbell_tags = 热核 喷管 引擎 超重型 提升 热量 推力 发射 thermal nozzle engine super heavy lift heat thrust launch
		
		// 固态堆芯热核火箭 (SCNTR)
		#LOC_strl_eng_062_SULEU_title = 斯特林 IPE-NV "SULEU" 0.625m
		#LOC_strl_eng_125_SULEU_title = 斯特林 IPE-NV "SULEU" 1.25m
		#LOC_strl_eng_187_SULEU_title = 斯特林 IPE-NV "SULEU" 1.875m
		#LOC_strl_eng_125_SULEU_desc = 在经历了数次涉及高浓缩铀的核泄漏阴影后，科学家们转向研究在 NERVA 衍生引擎机身中使用低浓缩铀的可行性。经过一系列奇妙的巧合，坎罗斯 (Krussian) 的 RD-0140 概念引擎成为了领先的参考机型，并展现出了对“低浓缩铀的卓越应用 (SULEU)”，该引擎也因此得名。
		#LOC_strl_eng_scntr_tags = 核能 热核 原子能 引擎 ntr scntr 固态 涅瓦 nerva engine nuclear nuk thermal atomic
		
		// 气态堆芯热核火箭 (GCNTR)
		#LOC_strl_eng_375_CCGC_title = 斯特林 IPE-GC "纤细" (Slim)
		#LOC_strl_eng_375_CCGC_desc = 许多好东西都产自坎夏，理所当然地，我们的员工中也有很多坎夏人。我们认为应该为他们准备一份巨大的惊喜：为我们的“核灯泡”产品寻找一种截然不同的形状。这一款是闭式循环，相对安全。我们期待每个人都能用上它。
		#LOC_strl_eng_375_OCGC_title = 斯特林 IPE-GC "微小" (Tiny)
		#LOC_strl_eng_375_OCGC_desc = 许多好东西都产自坎夏，理所当然地，我们的员工中也有很多坎夏人。我们认为应该为他们准备一份巨大的惊喜：为我们的“核灯泡”产品寻找一种截然不同的形状。这一款是开式循环，其使用受到了严格限制，甚至可能被直接禁用。
		#LOC_strl_eng_gcntr_tags = 核能 热核 原子能 引擎 气态堆芯 gcntr 核灯泡 nuclear nuk thermal atomic engine gas core lightbulb
		
		// 聚变引擎 (Fusion)
		#LOC_strl_eng_375_MCF_title = 斯特林 IPE-MC "葫芦" (Calabash)
		#LOC_strl_eng_375_MCF_desc = 这台外观神似某种水果的聚变火箭是聚变引擎的首选，灵感源自“发现二号 (Discovery II)”项目。“葫芦”是一个真正成熟的主引擎选择，它的工程设计非常精妙，拥有较小的燃烧室以实现补燃“换挡”功能，具备机械矢量控制，并能接收多种推进剂。还有什么比一个长得像食物且功能如此强大的引擎更棒的呢？？？……没有。
		#LOC_strl_eng_250_ICF_title = 斯特林 ISME-IC "奥林匹亚" (Olympian)
		#LOC_strl_eng_250_ICF_desc = 随着事态的自然发展和研发投入的增加，我们成功地将“伊卡洛斯”小型化了。不知为何，每个人都在庆祝这一成就，并喊着：“别再和我或者我儿子说话了！”（译注：此处为网络梗）
		#LOC_strl_eng_500_ICF_title = 斯特林 ISME-IC "伊卡洛斯" (Icarus)
		#LOC_strl_eng_500_ICF_desc = “伊卡洛斯”惯性约束聚变驱动器的传承极其强大，甚至不可逾越，尽管许多人是通过其姊妹型号“代达罗斯 (Daedalus)”的名字认识它的。经过两三代人的研发，这台引擎终于问世，其表现远比最初预想的更优秀、更强悍。
		#LOC_strl_eng_mcf_tags = 引擎 核聚变 磁约束 mcf 补燃 engine nuclear fusion magnetic confinement afterburn
		#LOC_strl_eng_icf_tags = 引擎 核聚变 惯性约束 icf 燃料球 engine nuclear fusion inertial confinement pellet
		
