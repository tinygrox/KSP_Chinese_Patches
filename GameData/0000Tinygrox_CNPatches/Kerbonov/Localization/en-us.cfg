Localization
{
	en-us
	{
		// Kerbonov Parts localization
		// Drop Tanks
		#autoLOC_kerbonov_50lDropTank_title = 50 Litre Drop Tank
		#autoLOC_kerbonov_50lDropTank_manufacturer = Kerbex Metal Recycling
		#autoLOC_kerbonov_50lDropTank_description = A tiny jettisonable galvanized steel fuel tank.
		
		#autoLOC_kerbonov_150lDropTank_title = 150 Litre Drop Tank
		#autoLOC_kerbonov_150lDropTank_manufacturer = Kerbex Metal Recycling
		#autoLOC_kerbonov_150lDropTank_description = A small jettisonable galvanized steel fuel tank.
		
		#autoLOC_kerbonov_400lDropTank_title = 400 Litre Drop Tank
		#autoLOC_kerbonov_400lDropTank_manufacturer = Kerbex Metal Recycling
		#autoLOC_kerbonov_400lDropTank_description = A large jettisonable galvanized steel fuel tank.
		
		// Fuel Tanks
		#autoLOC_kerbonov_fuelTank_extralong_title = FL-T1600 Fuel Tank
		#autoLOC_kerbonov_fuelTank_extralong_manufacturer = Jebediah Kerman's Junkyard and Spacecraft Parts Co
		#autoLOC_kerbonov_fuelTank_extralong_description = A further development of the FL-T line of 1.25 meter tanks, the FL-T1600 holds an incredible volume of fuel for its diameter. It manages this feat by being very, very long.
		
		#autoLOC_kerbonov_fuelTank4-0_title = Rockomax X200-4 Fuel Tank
		#autoLOC_kerbonov_fuelTank4-0_manufacturer = Rockomax Conglomerate
		#autoLOC_kerbonov_fuelTank4-0_description = The most compact tank in the Rockomax line contains a reasonable amount of fuel and oxidizer for its size.
		
		// Grid Fins
		#autoLOC_kerbonov_Gridfin_title = BN-14 Grid Fin
		#autoLOC_kerbonov_Gridfin_manufacturer = Kerbsmogorsk Heavy Industry
		#autoLOC_kerbonov_Gridfin_description = A grid fin's unique construction crams a huge effective surface area into a much more compact form factor than a conventional fin. This makes them ideal for steering during high-speed atmospheric flight.
		
		#autoLOC_kerbonov_SmallGridfin_title = BN-7 Grid Fin
		#autoLOC_kerbonov_SmallGridfin_manufacturer = Kerbsmogorsk Heavy Industry
		#autoLOC_kerbonov_SmallGridfin_description = This extra-compact grid fin is designed to be stowable inside the cramped confines of a payload fairing, and deployable once the fairing is jettisoned.
		
		// Command Parts
		#autoLOC_kerbonov_SeatHDCommand_title = Heavy Duty Command Seat
		#autoLOC_kerbonov_SeatHDCommand_manufacturer = Kerbonov Design Bureau
		#autoLOC_kerbonov_SeatHDCommand_description = This external command seat is encased in a sturdy steel tube frame for better survivability in the event of a crash.
		
		#autoLOC_kerbonov_HoodOrnament_title = Hood Ornament
		#autoLOC_kerbonov_HoodOrnament_manufacturer = Kerbex Metal Recycling
		#autoLOC_kerbonov_HoodOrnament_description = A small chrome hood ornament. Widely believed to improve the speed and handling of any vehicle to which it is attached.
		
		// Cockpits
		#autoLOC_kerbonov_KN2Cabin_title = Kn-2 Cockpit
		#autoLOC_kerbonov_KN2Cabin_manufacturer = Kerbonov Design Bureau
		#autoLOC_kerbonov_KN2Cabin_description = Made with up to 70% recycled crop duster parts, the Kn-2 cockpit module seats up to 3 Kerbals in conditions described in Kerbonov advertising copy as "cozy".
		
		#autoLOC_kerbonov_KN7Cabin_title = Kn-7 Cockpit
		#autoLOC_kerbonov_KN7Cabin_manufacturer = Kerbonov Design Bureau
		#autoLOC_kerbonov_KN7Cabin_description = With redundant life support systems and an advanced suite of electronics, this tough little cockpit is rated for interplanetary travel.
		
		// Engines
		#autoLOC_kerbonov_MiniTurbojetPod_title = J-6 "Pinwheel" RC Micro Turbojet
		#autoLOC_kerbonov_MiniTurbojetPod_manufacturer = Kerbonov Design Bureau
		#autoLOC_kerbonov_MiniTurbojetPod_description = A miniature jet turbine designed for remote controlled aircraft.
		
		// RCS
		#autoLOC_kerbonov_ModifiedProbeRCSBlock_title = Modified Self-Contained Probe RCS
		#autoLOC_kerbonov_ModifiedProbeRCSBlock_manufacturer = Kerbsmogorsk Heavy Industry
		#autoLOC_kerbonov_ModifiedProbeRCSBlock_description = A small RCS thruster block with its own built-in monopropellant supply. Two of the thrusters have been replaced with small reaction wheels for better low-speed control.
		
		#autoLOC_kerbonov_ProbeRCSBlock_title = Self-Contained Probe RCS
		#autoLOC_kerbonov_ProbeRCSBlock_manufacturer = Kerbsmogorsk Heavy Industry
		#autoLOC_kerbonov_ProbeRCSBlock_description = A small RCS thruster block with its own built-in monopropellant supply. Designed with probe cores in mind, but works just as well on crewed spacecraft.
		
		// Passenger Compartment
		#autoLOC_kerbonov_InlinePassengerCan_title = KPM-1 Small Inline Passenger Compartment
		#autoLOC_kerbonov_InlinePassengerCan_manufacturer = Kerbonov Design Bureau
		#autoLOC_kerbonov_InlinePassengerCan_description = A light, pressurized container for transporting a single Kerbal plus baggage.
		
		// Boosters
		#autoLOC_kerbonov_RATObottle_title = Rocket-Assisted Takeoff Booster
		#autoLOC_kerbonov_RATObottle_manufacturer = KerBoom Fireworks co.
		#autoLOC_kerbonov_RATObottle_description = A "RATO bottle" is a cheap, disposable booster for a tiny bit of extra liftoff thrust. It's essentially a solid rocket motor with some fins and a decoupler.
		
		// Decouplers
		#autoLOC_kerbonov_radialmicrodecoupler_title = Radial Micro Decoupler
		#autoLOC_kerbonov_radialmicrodecoupler_manufacturer = Kerbsmogorsk Heavy Industry
		#autoLOC_kerbonov_radialmicrodecoupler_description = A compact, lightweight surface-mount decoupler powered by a compressed gas capsule.
		
		// Cargo Bays
		#autoLOC_kerbonov_mk2SideloadCargoBayL_title = Mk2 Side-Loading Cargo Bay CRG-09
		#autoLOC_kerbonov_mk2SideloadCargoBayL_manufacturer = C7 Aerospace Division
		#autoLOC_kerbonov_mk2SideloadCargoBayL_description = This large bay is designed with a vertically opening clamshell door for sideways loading of cargo.
		
		#autoLOC_kerbonov_mk2SideloadCargoBayS_title = Mk2 Side-Loading Cargo Bay CRG-05
		#autoLOC_kerbonov_mk2SideloadCargoBayS_manufacturer = C7 Aerospace Division
		#autoLOC_kerbonov_mk2SideloadCargoBayS_description = This small bay is designed with a vertically opening clamshell door for sideways loading of cargo.
		
		// Antenna
		#autoLOC_kerbonov_VHFTransceiver_title = EP-63 VHF Transceiver
		#autoLOC_kerbonov_VHFTransceiver_manufacturer = Kerbsmogorsk Heavy Industry
		#autoLOC_kerbonov_VHFTransceiver_description = A small, efficient solid-state radio for communication and probe control at short to medium range.
	}
}