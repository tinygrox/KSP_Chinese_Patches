    #LOC_SMX_manufacturer_description = 随着外星采矿时代的到来，采矿业也迎来了变革。CEC是一个由老牌矿业公司和科技初创企业组成的松散联盟，它们联合起来评估、开发并拓展其商业模式，以囊括其他天体上新发现的矿物财富。为此，CEC致力于开发适用的工具与设备，从小型便携的探测器套件，到能供应最大型采矿基地需求的巨型挖掘机和矿物精炼厂。
    
