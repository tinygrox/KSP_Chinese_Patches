		// ********** 部件：nuclearEngineKANDL

		#LOC.aa_nuclearEngineKANDL_description = 将一个燃料泵入炽热的RTG放射性堆芯并导入喷管，你就得到了一个非常小的核火箭发动机。推力有点低，不过探测器不会在意。废热等级：400
		#LOC.aa_nuclearEngineKANDL_title = LV-RTG “KANDL” SKALOU.v2 放射性同位素火箭

		// ********** 部件：nuclearEngineLANTR

		#LOC.aa_nuclearEngineLANTR_description = 一种更紧凑、轻量化的核热火箭设计。全新功能：液氧增强加力模式——氧化剂直接注入喷管，与过热等离子体尾气剧烈反应，极大提升推力，但以降低比冲为代价。废热等级：250/500
		#LOC.aa_nuclearEngineLANTR_title = LV-Nx “LANTRN” 原子引擎

		// ********** 部件：nuclearEngineLightbulb

		#LOC.aa_nuclearEngineLightbulb_description = 闭式循环气芯设计突破了固体堆芯核热火箭的限制，让反应堆主动熔化并汽化，达到更高的堆芯温度和排气速度，赋予这款火箭高达1500秒的惊人比冲。然而，没有放射性物质会离开引擎——汽化的核狱火被安全地限制在七个异常脆弱的透明石英灯泡内，这些灯泡让大部分热辐射通过到达推进剂，也因此得名。一套精密的主动冷却系统以及围绕裂变核等离子体的稳定惰性气体涡流（防止其接触壁面）共同防止石英灯泡瞬间汽化。实际上，这听起来确实有点吓人，但正如生活中的一切，事物的酷炫程度与其危险程度成正比。废热等级：2000
		#LOC.aa_nuclearEngineLightbulb_title = CCGC-7.2 “灯泡” 原子引擎

		// ********** 部件：NuclearJetEngine

		#LOC.aa_NuclearJetEngine_description = 类似于化学涡轮喷气发动机，只是燃烧室被一个加热空气并驱动涡轮的核反应堆取代。由于不依赖化学燃烧，飞行时间不受限制，且引擎可在无氧大气中工作。唯一的缺点是重型反应堆屏蔽层带来的额外质量。
		#LOC.aa_NuclearJetEngine_tags = active atom efficient engine (torch nuclear nuke propuls radio reactor turbo jet
		#LOC.aa_NuclearJetEngine_title = LV-Tx “火炬” Skalou-v5 原子涡轮喷气发动机

