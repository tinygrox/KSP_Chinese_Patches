// ============================================
// SSI-10000m 合同汉化（里程碑合同示例）
// ============================================

@CONTRACT_TYPE[SSI-10000m]:FOR[CNPatches]
{
    @title = 驾驶飞机飞行到10,000米高度 // Fly an airplane to 10,000m.
    @description = SSI的Inigma Kerman希望您设计并驾驶一架能够在10,000米高度运行的飞机。他说这样的成就将使未来的航空旅行更安全，因为Kerbin的大部分恶劣天气只发生在这个高度以下。他说如果飞行员能够简单地飞越恶劣天气而不是穿越它，将开启大量区域甚至全球航空旅行的可能性。 // Inigma Kerman of SSI wants you to design and fly an aircraft capable of operating at an altitude of 10,000m. He says that such an accomplishment will make future air travel safer since most of Kerbin's serious weather only happens below this altitude. He says that if pilots could simply fly over bad weather rather than through it, it would unlock a large number of regional and possibly global air travel possibilities.
    @synopsis = 简单地从跑道发射一架飞机，飞行到10,000米高度，然后安全降落在KSC。 // Simply launch an airplane from the runway, fly up to 10,000m, then land back at KSC safely.
    @notes = 享受美景吧，在这个高度，云层（如果今天能看到的话）大部分都在您的飞机下方！ // Enjoy the view, as at this altitude the clouds (if any are seen today) will mostly be below your aircraft!
    @completedMessage = 你做到了！达到了10,000米高度，你的飞行员拍了一张很棒的照片！&br;&br;当你的飞行员在宇航员中心休息时，如果有兴趣，请务必与任务控制中心的Gene联系，获取另一个SSI机会。 // You did it! 10,000m reached, and your pilot snapped a great picture!&br;&br;While your pilot rests up at the Astronaut Complex, be sure to check in with Gene at Mission Control for another SSI opportunity if interested.
    
    // 参数标题汉化
    @PARAMETER[VesselParameterGroup]:HAS[#title[Your aircraft must]]
    {
        @title = 你的飞机必须 // Your aircraft must
    }
    
    @PARAMETER[HasCrew]:HAS[#title[have a certified pilot]]
    {
        @title = 拥有一名认证飞行员 // have a certified pilot
    }
    
    @PARAMETER[PartValidation]:HAS[#title[have wings]]
    {
        @title = 拥有机翼 // have wings
    }
    
    @PARAMETER[All]:HAS[#title[have an air breathing engine only]]
    {
        @title = 只能拥有空气呼吸发动机 // have an air breathing engine only
    }
    
    @PARAMETER[PartValidation]:HAS[#title[not have any solid rocket engines]]
    {
        @title = 不能有任何固体火箭发动机 // not have any solid rocket engines
    }
    
    @PARAMETER[PartValidation]:HAS[#title[not have any liquid rocket engines]]
    {
        @title = 不能有任何液体火箭发动机 // not have any liquid rocket engines
    }
    
    @PARAMETER[HasResource]:HAS[#title[not have any solid rocket fuel]]
    {
        @title = 不能有任何固体火箭燃料 // not have any solid rocket fuel
    }
    
    @PARAMETER[HasResource]:HAS[#title[not have any oxidizer]]
    {
        @title = 不能有任何氧化剂 // not have any oxidizer
    }
    
