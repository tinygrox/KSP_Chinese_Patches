// ============================================
// 合同汉化示例（以Airline-Flight-30为例）
// ============================================

@CONTRACT_TYPE[Airline-Flight-30]:NEEDS[SquadExpansion/MakingHistory]:FOR[CNPatches]
{
    @title = 航班30 - 机组：3人 乘客：@/numPassengers人 // Flight 30 - Crew: 3 Passengers: @/numPassengers
    @genericTitle = 航班30 - 机组：3人 乘客：12-84人 // Flight 30 - Crew: 3 Passengers: 12-84
    @description = 这是一次从沙漠机场到岛屿机场的单程客运航班。&br;&br;运送@/numPassengers名乘客前往岛屿机场。 // This is a one-way flight to deliver passengers from the Dessert Airfield to the Island Airfield.&br;&br;Fly out @/numPassengers passengers to the Island Airfield.
    @genericDescription = 这是一次从沙漠机场到岛屿机场的单程客运航班。&br;&br;运送乘客前往岛屿机场。 // This is a one-way flight to deliver passengers from the Dessert Airfield to the Island Airfield.&br;&br;Fly out passengers to the Island Airfield.
    @synopsis = 这是一次定期服务的单程航班。KSC航空公司的定期航班服务合同按乘客人数付费。 // This is a regular service one-way flight. KSC Airlines regular flight service contracts are paid on a per-passenger basis.
    @notes = 你只能使用飞机。 // You may only use an airplane.
    @completedMessage = 航班完成！&br;&br;提供零食：@/numSnacks份&br;使用呕吐袋：@/numAirSickness个&br;&br;KSC航空公司感谢您选择我们的友好天空。 // Flight Completed!&br;&br;Snacks served: @/numSnacks&br;Air sickness bags used: @/numAirSickness&br;&br;KSC Airlines thanks you for flying the friendly skies.
    
    // 参数标题汉化
    @PARAMETER[VesselParameterGroup]:HAS[#title[Your aircraft must]]
    {
        @title = 你的飞机必须 // Your aircraft must
    }
    
    @PARAMETER[HasCrew]:HAS[#title[have two certified pilots]]
    {
        @title = 拥有两名认证飞行员 // have two certified pilots
    }
    
    @PARAMETER[HasCrew]:HAS[#title[have a certified engineer]]
    {
        @title = 拥有一名认证工程师 // have a certified engineer
    }
    
    @PARAMETER[PartValidation]:HAS[#title[have wings]]
    {
        @title = 拥有机翼 // have wings
    }
    
    @PARAMETER[HasCrewCapacity]:HAS[#title[have at least @/numPassengers passenger seats]]
    {
        @title = 拥有至少@/numPassengers个乘客座位 // have at least @/numPassengers passenger seats
    }
    
    @PARAMETER[All]:HAS[#title[load all @/numPassengers passengers]]
    {
        @title = 装载所有@/numPassengers名乘客 // load all @/numPassengers passengers
    }
    
    // 对话文本汉化
    @BEHAVIOUR[DialogBox]
    {
        @DIALOG_BOX:HAS[#parameter[RequestTakeoffDessertAirfield]]
        {
            @TEXT
            {
                @text = 沙漠机场空管：Kesca三二零，你已获准通过Kerman离场飞行计划前往航天中心机场。从沙漠机场起飞，航向零八二，应答机代码零一一八。 // Dessert Airfield ATC: Kesca Three Two Zero, you are cleared to the Space Center airport via the Kerman departure flight plan. Depart the Dessert Airfield heading zero eight two, squawk zero one one eight.
            }
            @IMAGE:HAS[#characterName[Air Traffic Control]]
            {
                @characterName = 空中交通管制 // Air Traffic Control
            }
        }
        
        @DIALOG_BOX:HAS[#parameter[RequestLandingIsland]]
        {
            @TEXT
            {
                @text = 岛屿空管：Kesca三零，我们看到你正在进近。你已获准在岛屿机场降落。风向三四零，风速五到十节。 // Island ATC: Kesca Three Zero, we have you on approach. You are cleared to land on the Island Airfield. Winds three-forty at five to ten.
            }
            @IMAGE:HAS[#characterName[Air Traffic Control]]
            {
                @characterName = 空中交通管制 // Air Traffic Control
            }
        }
    }
    
    // 航点名称汉化
    @BEHAVIOUR[WaypointGenerator]
    {
        @WAYPOINT:HAS[#name[Dessert Airfield]]
        {
            @name = 沙漠机场 // Dessert Airfield
        }
        
        @PQS_CITY:HAS[#name[Island Airfield]]
        {
            @name = 岛屿机场 // Island Airfield
        }
    }
}

// ============================================
// GAP-Loan 合同汉化
// ============================================

@CONTRACT_TYPE[GAP-Loan]:FOR[CNPatches]
{
    @title = 风险资本融资贷款：20k // Venture Capital Funding Loan: 20k
    @description = 在GAP航空航天公司，我们照顾自己人。我们注意到您的资金有些紧张，在我们看到您陷入困境之前，我们想从GAP风险资本基金为您的组织提供一笔贷款。我们相信您有能力扭转局面，所以如果您接受这个提议，我们认为您将能从中受益。&br;&br;贷款金额：£ @/principal.Print() 资金。&br;&br;期限：@/period 天&br;&br;利息费用：@/posInterest% 或 £ @/interestPayment.Print() 资金。&br;&br;@/period 天后应付总额：£ @/posPayment.Print() 资金。&br;&br;此贷款在期限内免息。提前还款没有罚金。 // Here at GAP Aerospace, we take care of our own. We've noticed that you are running a little low on funds, and before we see you go under, we would like to offer your organization a loan from the GAP Venture Capital Fund. We believe in your ability to turn things around, so we think you will be able to benefit from this offer if you accept it.&br;&br;Loan Amount: £ @/principal.Print() funds.&br;&br;Term: @/period days&br;&br;Interest Charge: @/posInterest% or £ @/interestPayment.Print() funds.&br;&br;Total Due after @/period Days: £ @/posPayment.Print() funds.&br;&br;This loan is interest free for the duration of the term. There is no penalty for paying off this loan early.
    @synopsis = GAP航空航天公司愿意为您的组织提供财务生命线，如果您需要的话。 // GAP Aerospace is offering your organization a financial lifeline if you so desire.
    @notes = 要提前还清贷款并避免利息费用，只需在@/period天到期前取消合同。 // To pay the loan off early and avoid the interest charge, simply cancel the contract before @/period days is up.
    @completedMessage = 您的£ @/principal.Print()贷款已还清，但由于您等待了超过@/period天才还款，产生了@/posInterest%的利息费用£ @/interestPayment.Print()。我们希望您在此期间能够理顺财务状况！如果将来再次需要，我们随时在这里。 // Your loan of £ @/principal.Print() has been paid off, but with a @/posInterest% interest charge of £ @/interestPayment.Print() since you waited more than @/period days to pay us back. We hope you were able to get your financials back in order in the meantime! We'll be here if you need us again in the future.
    
    // 参数文本汉化
    @PARAMETER[Duration]:HAS[#preWaitText[Loan duration:]]
    {
        @preWaitText = 贷款期限： // Loan duration:
    }
    
    @PARAMETER[Duration]:HAS[#waitingText[ √ @/posPayment.Print() due on:]]
    {
        @waitingText = √ @/posPayment.Print() 到期于： // √ @/posPayment.Print() due on:
    }
    
    @PARAMETER[Duration]:HAS[#completionText[Your loan is due!]]
    {
        @completionText = 您的贷款到期了！ // Your loan is due!
    }
}

// ============================================
// Airline-Flight-101 合同汉化
// ============================================

@CONTRACT_TYPE[Airline-Flight-101]:FOR[CNPatches]
{
    @title = 航班101 - 机组：1人 乘客：@/numPassengers人 // Flight 101 - Crew: 1 Passengers: @/numPassengers
    @genericTitle = 航班101 - 机组：1人 乘客：4-8人 // Flight 101 - Crew: 1 Passengers: 4-8
    @description = KSC航空公司很自豪能为KSC工作人员和访客提供前往岛屿机场的航空运输服务。科学家和工程师经常前往岛屿机场从事各种项目工作，而前往KSC的游客都知道该岛是观看发射的最佳露营地之一。&br;&br;运送@/numPassengers名乘客前往岛屿机场，等待30秒让乘客下机和登机，然后起飞返回KSC。 // KSC Airlines is proud to offer air transportation service to the Island Airfield for KSC staff and visitors. Scientists and engineers often head out to the Island Airfield to work on various projects, and tourists to KSC know the island as one of the best places to camp out and watch launches.&br;&br;Fly out @/numPassengers passengers to the Island Airfield, wait 30 seconds to disembark and embark passengers, take off and return back to KSC.
    @genericDescription = KSC航空公司很自豪能为KSC工作人员和访客提供前往岛屿机场的航空运输服务。科学家和工程师经常前往岛屿机场从事各种项目工作，而前往KSC的游客都知道该岛是观看发射的最佳露营地之一。&br;&br;运送乘客前往岛屿机场，等待30秒让乘客下机和登机，然后起飞返回KSC。 // KSC Airlines is proud to offer air transportation service to the Island Airfield for KSC staff and visitors. Scientists and engineers often head out to the Island Airfield to work on various projects, and tourists to KSC know the island as one of the best places to camp out and watch launches.&br;&br;Fly out passengers to the Island Airfield, wait 30 seconds to disembark and embark passengers, take off and return back to KSC.
    @synopsis = 这是一次定期服务的往返航班，无需手动交换乘客。KSC航空公司的定期航班服务合同按乘客人数付费。 // This is a regular service round trip flight with no manual passenger exchange required. KSC Airlines regular flight service contracts are paid on a per-passenger basis.
    @notes = 你只能使用飞机。 // You may only use an airplane.
    @completedMessage = 航班完成！&br;&br;提供零食：@/numSnacks份&br;使用呕吐袋：@/numAirSickness个&br;&br;KSC航空公司感谢您选择我们的友好天空。 // Flight Completed!&br;&br;Snacks served: @/numSnacks&br;Air sickness bags used: @/numAirSickness&br;&br;KSC Airlines thanks you for flying the friendly skies.
    
    // 参数标题汉化
    @PARAMETER[VesselParameterGroup]:HAS[#title[Your aircraft must]]
    {
        @title = 你的飞机必须 // Your aircraft must
    }
    
    @PARAMETER[HasCrew]:HAS[#title[have a certified pilot]]
    {
        @title = 拥有一名认证飞行员 // have a certified pilot
    }
    
    @PARAMETER[PartValidation]:HAS[#title[have wings]]
    {
        @title = 拥有机翼 // have wings
    }
    
    @PARAMETER[HasCrewCapacity]:HAS[#title[have at least @/numPassengers passenger seats]]
    {
        @title = 拥有至少@/numPassengers个乘客座位 // have at least @/numPassengers passenger seats
    }
    
    // 对话文本汉化
    @BEHAVIOUR[DialogBox]
    {
        @DIALOG_BOX:HAS[#parameter[RequestTakeoffKSC]]
        {
            @TEXT
            {
                @text = KSC空管：Kesca一零一，你已获准前往岛屿机场，使用零九跑道离场，航向零九零，应答机代码零一一六。 // KSC ATC: Kesca One Zero One, you are cleared to the Island Airfield depature on runway zero niner, heading zero niner zero, squawk zero one one six.
            }
            @IMAGE:HAS[#characterName[Air Traffic Control]]
            {
                @characterName = 空中交通管制 // Air Traffic Control
            }
        }
        
        @DIALOG_BOX:HAS[#parameter[RequestLandingIsland]]
        {
            @TEXT
            {
                @text = 岛屿空管：Kesca一零一，我们看到你正在进近。你已获准在岛屿机场零一跑道降落。风向三四零，风速五到十节。 // Island ATC: Kesca One Zero One, we have you on approach. You are cleared to land on Island Airfield zero one. Winds three-forty at five to ten.
            }
            @IMAGE:HAS[#characterName[Air Traffic Control]]
            {
                @characterName = 空中交通管制 // Air Traffic Control
            }
        }
        
        @DIALOG_BOX:HAS[#parameter[RequestTakeoffIsland]]
        {
            @TEXT
            {
                @text = 岛屿空管：Kesca一零一，你已获准通过Kerman离场飞行计划前往航天中心机场。从岛屿机场起飞，航向零九零，应答机代码零一一六。 // Island ATC: Kesca One Zero One, you are cleared to the Space Center airport via the Kerman departure flight plan. Depart the Island Airfield heading zero niner zero, squawk zero one one six.
            }
            @IMAGE:HAS[#characterName[Air Traffic Control]]
            {
                @characterName = 空中交通管制 // Air Traffic Control
            }
        }
        
        @DIALOG_BOX:HAS[#parameter[RequestLandingKSC]]
        {
            @TEXT
            {
                @text = KSC空管：Kesca一零一，我们看到你正在进近。你已获准在二七跑道降落。风向三四零，风速十到十五节。 // KSC ATC: Kesca One Zero One, we have you on approach. You are cleared to land on runway two seven. Winds three-forty at ten to fifteen.
            }
            @IMAGE:HAS[#characterName[Air Traffic Control]]
            {
                @characterName = 空中交通管制 // Air Traffic Control
            }
        }
    }
    
    // 航点名称汉化
    @BEHAVIOUR[WaypointGenerator]
    {
        @PQS_CITY:HAS[#name[Island Airfield]]
        {
            @name = 岛屿机场 // Island Airfield
        }
        
        @PQS_CITY:HAS[#name[KSC Air Terminal]]
        {
            @name = KSC航空航站楼 // KSC Air Terminal
        }
        
        @PQS_CITY:HAS[#name[KSC Runway]]
        {
            @name = KSC跑道 // KSC Runway
        }
    }
}

