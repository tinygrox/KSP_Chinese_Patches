// Airline-Flight-30
@CONTRACT_TYPE[Airline-Flight-30]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = 航班30 - 机组: 3 乘客: @/numPassengers
    @genericTitle = 航班30 - 机组: 3 乘客: 4-8
    @description = 这是一次长途航班，运送乘客从KSC到极地机场并返回。&br;&br;运送@/numPassengers名乘客至极地机场，等待30秒让乘客下机并登机，然后起飞返回KSC。
    @genericDescription = 这是一次长途航班，运送乘客从KSC到极地机场并返回。&br;&br;运送乘客至极地机场，等待30秒让乘客下机并登机，然后起飞返回KSC。
    @synopsis = 这是一次常规服务的往返航班，无需手动交换乘客。KSC航空公司的常规航班服务合约按每位乘客付费。
    @notes = 你只能使用飞机。
    @completedMessage = 航班完成！&br;&br;提供零食: @/numSnacks&br;使用呕吐袋: @/numAirSickness&br;&br;KSC航空公司感谢您选择我们的友好天空之旅。
}

// Airline-Flight-101
@CONTRACT_TYPE[Airline-Flight-101]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = 航班101 - 机组: 1 乘客: @/numPassengers
    @genericTitle = 航班101 - 机组: 1 乘客: 4-8
    @description = KSC航空公司自豪地为KSC工作人员和访客提供前往岛屿机场的航空运输服务。科学家和工程师经常前往岛屿机场从事各种项目工作，而前往KSC的游客知道该岛是观看发射的最佳露营地之一。&br;&br;运送@/numPassengers名乘客至岛屿机场，等待30秒让乘客下机并登机，然后起飞返回KSC。
    @genericDescription = KSC航空公司自豪地为KSC工作人员和访客提供前往岛屿机场的航空运输服务。科学家和工程师经常前往岛屿机场从事各种项目工作，而前往KSC的游客知道该岛是观看发射的最佳露营地之一。&br;&br;运送乘客至岛屿机场，等待30秒让乘客下机并登机，然后起飞返回KSC。
    @synopsis = 这是一次常规服务的往返航班，无需手动交换乘客。KSC航空公司的常规航班服务合约按每位乘客付费。
    @notes = 你只能使用飞机。
    @completedMessage = 航班完成！&br;&br;提供零食: @/numSnacks&br;使用呕吐袋: @/numAirSickness&br;&br;KSC航空公司感谢您选择我们的友好天空之旅。
    
    // PARAMETER节点汉化
    @PARAMETER[VesselParameterGroup],0
    {
        @title = 你的飞行器必须
    }
    
    @PARAMETER[HasCrew],0
    {
        @title = 有一名认证飞行员
    }
    
    @PARAMETER[PartValidation],0
    {
        @title = 拥有机翼
    }
    
    @PARAMETER[HasCrewCapacity],0
    {
        @title = 拥有至少@/numPassengers个乘客座位
    }
    
    @PARAMETER[All],0
    {
        @title = 装载所有@/numPassengers名乘客
    }
    
    @PARAMETER[LaunchSite],0
    {
        @title = 从KSC出发
    }
    
    @PARAMETER[RequestLandingIsland],0
    {
        @title = 请求降落许可（岛屿机场）
    }
    
    @PARAMETER[RequestTakeoffKSC],0
    {
        @preWaitText = 请求起飞许可:
        @waitingText = 正在请求起飞许可:
        @completionText = 获得起飞许可
    }
}

