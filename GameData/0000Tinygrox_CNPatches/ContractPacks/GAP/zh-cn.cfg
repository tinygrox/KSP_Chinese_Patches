#LOC_CP_GAP_Contract_CompleteContract_title = Fly an airplane to 2,500m.
#LOC_CP_GAP_Contract_CompleteContract_description = Taking off and landing is easy. Flying up to 2,500m with an air-breathing engine and landing back at the runway... is an entirely different matter. Wilbur Kerman says runways are the roads of the future, and says your pilots might as well get used to landing on one.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Simply launch an airplane from the runway, fly up to 2,500m, then land back at the runway safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = Enjoy the view!
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = Another historic flight completed!&br;&br;Your pilot is starting to showing some amazing skill with that last landing.
