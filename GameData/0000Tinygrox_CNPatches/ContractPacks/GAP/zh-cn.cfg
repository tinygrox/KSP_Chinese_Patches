#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_12_title = the KSC Runway
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_13_title = or the Spaceplane Hangar Air Terminal
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_14_title = safely
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_15_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_16_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Fly a spaceplane to the edge of space!
#LOC_CP_GAP_Contract_CompleteContract_description = The Kerbal Space Program wants SSI Aerospace to be the first to develop a spaceplane for use in its space program. Inigma Kerman already had you on speed dial, and is currently asking your organization to lead this cutting edge effort.&br;&br;Inigma says that you will need to develop a spaceplane - one that will be able to fly to the highest reaches of the atmosphere, and land on the ground safely. It's not that hard to say that 60,000m is a mere skip away from space. He says the Kerbal Space Program has already given authorization to make this a suborbital flight if desired - assuming you can engineer your spaceplane to do so, but it's not required to complete the mission.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Simply launch a spaceplane from the runway and fly up to 60,000m and then land your spaceplane anywhere on the ground safely. You may use an air-breathing engine, or liquid fueled engine, or both.
#LOC_CP_GAP_Contract_CompleteContract_notes = High above Kerbin, where space meets the air, and the stars beckon, will you realize that the universe is at your fingertips. That is, if Kerbals even have fingers other than their thumbs.
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = Your spaceplane mission was a success! Mission Control erupted in celebration when you flew above 60,000m, and again when you landed. There are compliments all around, and your organization has been honored with a fairly large reward.
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your aircraft must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_3_title = have wings
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_4_title = not have any solid rocket motors
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_5_title = fly up to 60,000m
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_6_title = and then land and stop anywhere
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_7_title = safely
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Break the sound barrier!
#LOC_CP_GAP_Contract_CompleteContract_description = SSI Aerospace's chief scientist Mach Kerman, and KSP retired test pilot Yeager Kerman, want to push SSI toward developing a spaceplane. But before this can happen, Inigma Kerman of SSI says they need to master supersonic flight, and to do this, he is asking your organization to design a plane that can break through the sound barrier in level flight under 20,000m.&br;&br;Although not required to complete this challenge, Mach Kerman believes that if you design an airplane to use one of the new liquid fueled rocket engines being developed for use by the space program, might make this attempt easier to accomplish.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Launch an airplane from the runway, fly between 2,500m and 20,000m, exceed 343 m/s in level flight for 5 seconds, and then land back at KSC safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = No one has ever gone faster than the speed of sound before, so most scientists and engineers are at a loss as to give you any useful advice. Even if they could, they're afraid you'd be traveling to fast to hear it anyways.
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = You have broken the sound barrier and achieved the amazing speed of Mach 1! Don't worry, we're sure it can be fixed back up in a jiffy for the next guy!
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your aircraft must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_3_title = have wings
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_4_title = not have any solid rocket motors
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_5_title = break the sound barrier
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_6_title = fly between 2500m and 20,000m
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_7_title = fly faster than 343 m/s
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = with less than 10 m/s of vertical speed
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = and then land and stop
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_10_title = at one of the following recovery areas
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_11_title = the KSC Runway
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_12_title = or the Spaceplane Hangar Air Terminal
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_13_title = safely
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_14_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_15_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Achieve Mach 2!
#LOC_CP_GAP_Contract_CompleteContract_description = Mach Kerman believes with current liquid-fueled rocket technology, that it's possible to exceed Mach 2, which is twice the speed of sound. Doing so would bring SSI another step closer to spaceplane development. He wants you to take an airplane above 2,500m but below 20,000m and see if you can exceed Mach 2 safely in level controlled flight.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Launch an airplane from the runway, fly between 2,500m and 20,000m, exceed 686 m/s in level flight for 5 seconds, and then land back at KSC safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = Going Mach 1 was cool. Going Mach 2 will be even cooler. Unfortunately, scientists at SSI and at KSC both predict it will also lead to twice the number of required autographs when you get back.
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = Wow! You did it! You reached Mach 2, and came back safely!&br;&br;Inigma passed your flight data to Gene Kerman at the Kerbal Space Program, and Gene says he's very proud of your accomplishments, and that he's very glad to have you and SSI Aerospace working together.
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your aircraft must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_3_title = have wings
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_4_title = not have any solid rocket motors
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_5_title = achieve Mach 2
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_6_title = fly between 2500m and 20,000m
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_7_title = fly faster than 686 m/s
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = with less than 10 m/s of vertical speed
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = and then land and stop
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_10_title = at one of the following recovery areas
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_11_title = the KSC Runway
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_12_title = or the Spaceplane Hangar Air Terminal
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_13_title = safely
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_14_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_15_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Achieve Mach 3!
#LOC_CP_GAP_Contract_CompleteContract_description = Gene Kerman wants SSI to develop supersonic aircraft for use by the space program. Inigma Kerman wants to use this as an opportunity to take another step toward the development of a spaceplane, and impress Gene with another SSI success. Therefore, Inigma is asking your organization to attempt a supersonic test flight exceeding Mach 3 by taking an airplane above 2,500m but below 25,000m and exceeding Mach 3 safely in a level, and controlled flight. Mach Kerman has informed SSI that this is not going to be easy as thermal effects are expected at this speed, but everyone at SSI believes achieving this milestone necessary for the development of a spaceplane which will need to fly far faster than Mach 3 to be successful.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Launch an airplane from the runway, fly between 2,500m and 25,000m, exceed 1029 m/s in level flight for 5 seconds, and then land back at KSC safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = Mach 3 is definitely not cool. IN fact, it's the threshold of the flames of fire. The aerodynamic forces attacking your plane will be relentless, and unforgiving. Send a brave pilot who you know will keep his cool in flight.
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = Incredible! You have achieved Mach 3!&br;&br;Inigma Kerman says this flight brings the spaceplane program one crucial step toward reality, and also comes with some significant funds from the Kerbal Space Program who will benefit from your flight data.
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your aircraft must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_3_title = have wings
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_4_title = not have any solid rocket motors
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_5_title = achieve Mach 3
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_6_title = fly between 2500m and 25,000m
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_7_title = fly faster than 1029 m/s
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = with less than 15 m/s of vertical speed
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = and then land and stop
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_10_title = at one of the following recovery areas
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_11_title = the KSC Runway
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_12_title = or the Spaceplane Hangar Air Terminal
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_13_title = safely
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_14_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_15_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Achieve Mach 4!
#LOC_CP_GAP_Contract_CompleteContract_description = Gene Kerman wants to see if SSI Aerospace and your organization can pull off the final leg of the air speed program, and gather data for aircraft thermal effects and handling of an aircraft at high supersonic speed. What speed? Mach 4. Inigma Kerman told Gene that SSI and its partners can do it. He wants you to take up this final airspeed challenge and see if you can get an aircraft to achieve Mach 4 flying above 2,500m but below 35,000m, in level flight. If it can be done, then it opens the door to developing a spaceplane prototype in the near future.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Launch an airplane from the runway, fly between 2,500m and 25,000m, exceed 1372 m/s in level flight for 5 seconds, and then land and stop anywhere safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = Four times the speed of sound doesn't sound...er seem that much more than three times the speed of sound. That is, unless you're a meteor, which at some point in this mission someone on the ground might mistake you for one. Good luck!
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = Congratulations! You have achieved Mach 4!&br;&br;Gene says the Kerbal Space Program and its affiliates are serious about reaching space via a spaceplane, and will look to SSI and to your organization to make it happen soon.
