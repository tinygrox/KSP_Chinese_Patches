#LOC_CP_GAP_Contract_CompleteContract_title = Land on a helipad!
#LOC_CP_GAP_Contract_CompleteContract_description = We want you to test your first helicopter or Vertical Take-Off and Landing (VTOL) prototype. Land on one of the available helipads.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = For science (and a few funds)!
#LOC_CP_GAP_Contract_CompleteContract_notes = Make a helicopter or VTOL and land on a VAB or Administration Building helipad!
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = Flight Completed! And you're still alive, which is even better since most helicopter and other VTOL test flights have been fatal.
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your aircraft must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_3_title = land on a helipad
