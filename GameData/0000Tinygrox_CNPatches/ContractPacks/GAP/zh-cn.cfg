#LOC_CP_GAP_Contract_CompleteContract_title = Achieve an airspeed of 100 m/s
#LOC_CP_GAP_Contract_CompleteContract_description = Kurtis Kerman, a friend of Wilbur Kerman, suggests that an airplane, if designed properly, should be able to exceed speeds faster than the fastest ground vehicles, and without having to dive toward the ground to do it. Wright Aeronautical is interested in helping to prove that this is possible (we're hoping you know which "this" we're referring to). They want you to take an air-breathing airplane above 2,500m but below 5,000m and see if you can exceed 100 m/s safely in level controlled flight, and thus break the current manned vehicle speed record.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Simply launch an airplane from the runway, fly between 2,500m and 5,000m, exceed 220 m/s in level flight for 5 seconds, and then land back at KSC safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = Let's get flying!
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = Congratulations, you have set a new air speed record of 100 m/s!&br;&br;You have justified Kurtis Kerman's theories on high speed air flight, and brought another measure of fame and reputation to Wright Aeronautical. Sponsors are starting to ask how they can support the new air speed frontier. Check in with Mission Control to see if Wright Aeronautical has another contract waiting for you!
