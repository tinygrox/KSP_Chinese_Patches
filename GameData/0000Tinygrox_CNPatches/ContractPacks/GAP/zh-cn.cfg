#LOC_CP_GAP_Contract_PartUnlocked_PARAMETER_5_title = not have any engines after launch
#LOC_CP_GAP_Contract_PartUnlocked_PARAMETER_6_title = get airborne
#LOC_CP_GAP_Contract_PartUnlocked_PARAMETER_7_title = and then land and stop anywhere
