#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Build and fly a seaplane!
#LOC_CP_GAP_Contract_CompleteContract_description = You've proven the airworthiness of your aircraft so far. But can you modify it or design an aircraft that can land on water? We want you to attempt an aviation first - landing an airplane on water, and taking back off again. Our engineers would like to call such an idea a seaplane, and they think it will really be useful to a number of organizations at KSC if the idea can be proven.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Land a seaplane on the surface of the water at the waypoint, and take off again and land back at KSC.
#LOC_CP_GAP_Contract_CompleteContract_notes = Your craft must be an airplane that can land on water horizontally and take off again.
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = Congratulations on another aviation first! You have propelled your organization to one of the most popular organizations on Kerbin. GAP has credited your account with a share of funds from various investors who are excited about your organization's future.
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your seaplane must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_3_title = have wings
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_4_title = land on water
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_5_title = and slow to 3.0 m/s or less
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_6_title = and then go at least 20.0 m/s on water
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_7_title = and then get airborne
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = and then land and stop
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = at one of the following recovery areas
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_10_title = the KSC Runway
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_11_title = or the Spaceplane Hangar Air Terminal
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_12_title = safely
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_13_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_14_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Fly an airplane to 10,000m.
#LOC_CP_GAP_Contract_CompleteContract_description = Inigma Kerman of SSI wants you to design and fly an aircraft capable of operating at an altitude of 10,000m. He says that such an accomplishment will make future air travel safer since most of Kerbin's serious weather only happens below this altitude. He says that if pilots could simply fly over bad weather rather than through it, it would unlock a large number of regional and possibly global air travel possibilities.
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Simply launch an airplane from the runway, fly up to 10,000m, then land back at KSC safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = Enjoy the view, as at this altitude the clouds (if any are seen today) will mostly be below your aircraft!
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = You did it! 10,000m reached, and your pilot snapped a great picture!&br;&br;While your pilot rests up at the Astronaut Complex, be sure to check in with Gene at Mission Control for another SSI opportunity if interested.
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your aircraft must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_3_title = have wings
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_4_title = have an air breathing engine only
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_5_title = not have any solid rocket engines
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_6_title = not have any liquid rocket engines
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_7_title = not have any solid rocket fuel
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = not have any oxidizer
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = fly up to 10,000m
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_10_title = and then land and stop
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_11_title = at one of the following recovery areas
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_12_title = the KSC Runway
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_13_title = or the Spaceplane Hangar Air Terminal
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_14_title = safely
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_15_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_16_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Fly an airplane to 20,000m.
#LOC_CP_GAP_Contract_CompleteContract_description = Maculator Kerman has another challenge for you, this time one that could very well unlock opportunities for regular global air travel - achieve a flying altitude of 20,000m. He says accomplishing such a flying altitude will prove that even the highest mountains on Kerbin can be flown over, which would unlock nearly any destination on Kerbin by air!
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Simply launch an airplane from the runway, fly up to 20,000m, then land back at KSC safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = Enjoy the view, as at this altitude the curvature of Kerbin will be clearly visible!
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = You did it! 20,000m reached!&br;&br;A number of opportunities have opened up now that global air travel is just on the horizon of possibility. Check back in with Mission Control for a new contract opportunities!
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your aircraft must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_3_title = have wings
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_4_title = have an air breathing engine only
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_5_title = not have any solid rocket engines
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_6_title = not have any liquid rocket engines
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_7_title = not have any solid rocket fuel
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = not have any oxidizer
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = fly up to 20,000m
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_10_title = and then land and stop
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_11_title = at one of the following recovery areas
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_12_title = the KSC Runway
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_13_title = or the Spaceplane Hangar Air Terminal
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_14_title = safely
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_15_title = without destroying your aircraft
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_16_title = or killing anyone

#LOC_CP_GAP_Contract_CompleteContract_title = Fly an airplane to 35,000m.
#LOC_CP_GAP_Contract_CompleteContract_description = SSI Aerospace and the Kerbal Space Program have selected your organization to receive special funding to design and fly an aircraft that will reach the upper atmospheric height of 35,000m. Inigma Kerman explains that accomplishing this feat will open up the exciting frontier of spaceplane development!
#LOC_CP_GAP_Contract_CompleteContract_synopsis = Simply launch an airplane from the runway, fly up to 35,000m, then land back at KSC safely.
#LOC_CP_GAP_Contract_CompleteContract_notes = Enjoy the view, as at this altitude you will feel as if you are touching the very boundary of space!
#LOC_CP_GAP_Contract_CompleteContract_completedMessage = You did it! 35,000m reached! The air was really thin up there, wasn't it? No worries, we have fresh air back at Mission Control.&br;&br;Great job! The Spaceplane Frontier is opened!
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_1_title = Your aircraft must
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_2_title = have a certified pilot
