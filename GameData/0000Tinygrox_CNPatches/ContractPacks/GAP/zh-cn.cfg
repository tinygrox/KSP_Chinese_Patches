#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_5_title = not have any solid rocket engines
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_6_title = not have any liquid rocket engines
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_7_title = not have any solid rocket fuel
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_8_title = not have any oxidizer
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_9_title = fly up to 35,000m
#LOC_CP_GAP_Contract_CompleteContract_PARAMETER_10_title = and then land and stop
