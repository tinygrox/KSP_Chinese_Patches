    @description = 这是最高级别的服务。这是一次多航段的往返航班，从甜点机场运送乘客到岛屿机场，再到KSC，然后返回甜点机场。&br;&br;运送@/numPassengers名乘客，在每个航段等待30秒让乘客下机和登机，然后返回甜点机场。 // The ultimate in service. This is a multi-leg round trip flight to deliver passengers from the Dessert Airfield to the Island Airfield, then to KSC, then back to the Dessert Airfield.&br;&br;Fly out @/numPassengers passengers, wait 30 seconds to disembark and embark passengers at each leg, and return back to the Dessert Airfield.
    @genericDescription = 这是最高级别的服务。这是一次多航段的往返航班，从甜点机场运送乘客到岛屿机场，再到KSC，然后返回甜点机场。&br;&br;运送乘客，在每个航段等待30秒让乘客下机和登机，然后返回甜点机场。 // The ultimate in service. This is a multi-leg round trip flight to deliver passengers from the Dessert Airfield to the Island Airfield, then to KSC, then back to the Dessert Airfield.&br;&br;Fly out passengers, wait 30 seconds to disembark and embark passengers at each leg, and return back to the Dessert Airfield.
    @synopsis = 这是一次常规服务的往返航班，无需手动交换乘客。KSC航空公司的常规航班服务合同按每位乘客付费。 // This is a regular service round trip flight with no manual passenger exchange required. KSC Airlines regular flight service contracts are paid on a per-passenger basis.
    @notes = 您只能使用飞机。建议您考虑本次旅行的燃料使用情况，必要时计划加油。 // You may only use an airplane. It is recommended that you consider fuel usage on this trip, and plan for refueling if necessary.
    @completedMessage = 航班完成！&br;&br;提供零食：@/numSnacks&br;使用呕吐袋：@/numAirSickness&br;&br;KSC航空公司感谢您选择友好的天空之旅。 // Flight Completed!&br;&br;Snacks served: @/numSnacks&br;Air sickness bags used: @/numAirSickness&br;&br;KSC Airlines thanks you for flying the friendly skies.
    
