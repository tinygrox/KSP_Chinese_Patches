@CONTRACT_TYPE[GAP-Wright-Wing]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = 购买机翼技术。 // Purchase wing tech.
    @description = 你好，我是奥维尔·科曼，我和我的兄弟创立了莱特航空。我们最初是一家自行车公司，但最近才开始探索空气动力学领域。我们最近开发了飞行控制技术，我们知道这最终将导致可控制的飞行器！&br;&br;您可以购买以下生产就绪的原型，这将使您能够开始制造飞行器：&br;&br;- E型机翼连接器 // Hello, my name is Orville Kerman, and I and my brother founded Wright Aeronautical. We started out with a bicycle company but have only recently begun exploring the area of aerodynamics. We have recently developed flight control technology that we know will eventually lead to controllable flying machines!&br;&br;You may purchase the following production-ready prototype that will allow you to start making flying machines:&br;&br;- Wing Connector Type E
    @synopsis = 飞行控制技术触手可及！只需支付我们初始生产运行的成本，这个原型就归您了！ // Flight control technology is at your fingertips! Simply cover the cost of our initial production run, and this prototype will be yours! 
    @notes = 合同接受后，该部件将立即对您的组织可用。 // The part will be available immediately to your organization upon contract acceptance.
    @completedMessage = 部件转移完成。&br;&br;您的组织现在可以访问以下部件：&br;&br;- E型机翼连接器&br;&br;享受新部件吧！ // Part transfer complete.&br;&br;Your organization now has access to the following:&br;&br;- Wing Connector Type E&br;&br;Enjoy the new part!
}

