@CONTRACT_TYPE[GAP-Helicopter]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = 直升机！ // Helicopter!
    @description = 在飞行器中，没有什么比能够在任何地方垂直起降更令人印象深刻的了。我们相信您是完成这一壮举的合适人选。&br;&br;设计、建造和驾驶一架能够在任意位置悬停的直升机。 // Among flying machines, nothing is more impressive than the ability to take off and land vertically, anywhere. We believe you're the right person to achieve this feat.&br;&br;Design, construct, and pilot a helicopter that can hover in place.
    @synopsis = 创造一架能够悬停的直升机，展示垂直飞行能力。 // Create a helicopter capable of hovering to demonstrate vertical flight capabilities.
    @notes = 您的直升机必须能够在不移动的情况下保持悬停至少30秒。 // Your helicopter must be able to maintain a hover for at least 30 seconds without moving.
    @completedMessage = 令人印象深刻！垂直飞行确实是航空的未来。我们迫不及待地想看到您接下来会建造什么。 // Impressive! Vertical flight is truly the future of aviation. We can't wait to see what you'll build next.
}

@CONTRACT_TYPE[GAP-Seaplane]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = 水上飞机！ // Seaplane!
}

@CONTRACT_TYPE[SSI-10000m]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = SSI 10000米！ // SSI 10000m!
    @description = SSI的Inigma·科曼希望您设计并驾驶一架能够在10000米高度运行的飞机。他说这样的成就将使未来的航空旅行更安全，因为Kerbin上大部分的恶劣天气都发生在这一高度以下。他表示，如果飞行员能够简单地飞越恶劣天气而不是穿越它，将解锁大量区域乃至全球的航空旅行可能性。 // Inigma Kerman of SSI wants you to design and fly an aircraft capable of operating at an altitude of 10,000m. He says that such an accomplishment will make future air travel safer since most of Kerbin's serious weather only happens below this altitude. He says that if pilots could simply fly over bad weather rather than through it, it would unlock a large number of regional and possibly global air travel possibilities.
    @synopsis = 只需从跑道发射一架飞机，飞行到10000米高度，然后安全降落在KSC。 // Simply launch an airplane from the runway, fly up to 10,000m, then land back at KSC safely.
    @notes = 享受风景吧，因为在这个高度，云层（如果有的话）大部分都会在您的飞机下方！ // Enjoy the view, as at this altitude the clouds (if any are seen today) will mostly be below your aircraft!
    @completedMessage = 您做到了！达到了10000米，您的飞行员拍了一张很棒的照片！&br;&br;在您的飞行员在宇航员综合楼休息时，如果有兴趣，请务必与任务控制中心的Gene联系，获取另一个SSI机会。 // You did it! 10,000m reached, and your pilot snapped a great picture!&br;&br;While your pilot rests up at the Astronaut Complex, be sure to check in with Gene at Mission Control for another SSI opportunity if interested.
}

@CONTRACT_TYPE[SSI-20000m]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = SSI 20000米！ // SSI 20000m!
    @description = SSI Aerospace为您提供了另一个高空飞行挑战！这次的目标高度是20000米。Inigma·科曼解释说，在这个高度，空气稀薄到足以需要增压系统，但空气阻力也足够低，可以实现更高的速度。他认为这是开发能够往返KSC和Kerbin其他地方的高效客机的关键步骤。 // SSI Aerospace has another high altitude flight challenge for you! This time the target altitude is 20,000m. Inigma Kerman explains that at this altitude, the air is thin enough to require pressurization systems, but the drag is low enough to allow for higher speeds. He believes this is a key step toward developing efficient passenger aircraft that can travel between KSC and other parts of Kerbin.
    @synopsis = 设计并驾驶一架能够达到20000米高度的飞机，然后安全返回KSC。 // Design and pilot an aircraft capable of reaching 20,000m, then safely return to KSC.
    @notes = 在这个高度，您的飞机将接近平流层。确保您的发动机能够在这种稀薄空气中工作。 // At this altitude, your aircraft will be approaching the stratosphere. Make sure your engines can operate in such thin air.
    @completedMessage = 出色的表现！20000米高度已被征服，您的工程团队正在分析收集到的数据。我们相信这将为更快的航空旅行铺平道路。 // Excellent performance! 20,000m has been conquered, and your engineering team is analyzing the data collected. We believe this will pave the way for faster air travel.
}

@CONTRACT_TYPE[SSI-35000m]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = SSI 35000米！ // SSI 35000m!
    @description = 现在是真正的挑战：35000米！在这个高度，您将正式进入平流层。空气极其稀薄，温度极低，但这里也是现代喷气式客机巡航的理想高度。Inigma·科曼相信，掌握这一高度将使您的组织处于Kerbin航空技术的前沿。 // Now for a real challenge: 35,000m! At this altitude, you'll officially be in the stratosphere. The air is extremely thin, temperatures are frigid, but this is also where modern jet airliners cruise. Inigma Kerman believes that mastering this altitude will put your organization at the forefront of Kerbin's aviation technology.
    @synopsis = 建造一架能够达到35000米高度的飞机，展示高空飞行能力。 // Construct an aircraft capable of reaching 35,000m to demonstrate high-altitude flight capabilities.
    @notes = 在这个高度，您需要考虑增压、热控制和发动机性能。这不仅仅是关于高度，更是关于可持续飞行。 // At this altitude, you'll need to consider pressurization, thermal control, and engine performance. It's not just about altitude, but about sustainable flight.
    @completedMessage = 里程碑达成！35000米高度是商业航空的未来。您的成就将被载入航空史册。 // Milestone achieved! 35,000m is the future of commercial aviation. Your accomplishment will be remembered in aviation history.
}

@CONTRACT_TYPE[SSI-60000m]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = SSI 60000米！ // SSI 60000m!
    @description = 终极高度挑战：60000米！在这个边缘空间的高度，大气层几乎不存在。您的飞机将介于大气飞行和太空飞行之间。Inigma·科曼表示，这是SSI Aerospace的终极测试，将证明您的工程技术能够应对最极端的环境。 // The ultimate altitude challenge: 60,000m! At this near-space altitude, the atmosphere is almost non-existent. Your aircraft will be straddling the line between atmospheric and space flight. Inigma Kerman says this is the ultimate test from SSI Aerospace, proving your engineering can handle the most extreme environments.
    @synopsis = 设计一架能够达到60000米高度的飞机，突破大气飞行的极限。 // Design an aircraft capable of reaching 60,000m, pushing the boundaries of atmospheric flight.
    @notes = 在这个高度，传统空气动力学几乎不起作用。您需要创新的推进和控制系统。 // At this altitude, traditional aerodynamics almost cease to function. You'll need innovative propulsion and control systems.
    @completedMessage = 非凡的成就！60000米高度代表了航空工程的巅峰。您已经超越了大气飞行的极限，进入了边缘空间领域。 // Extraordinary achievement! 60,000m represents the pinnacle of aeronautical engineering. You've pushed beyond the limits of atmospheric flight and into the realm of near-space.
}

