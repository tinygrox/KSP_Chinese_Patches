@CONTRACT_TYPE[GAP-Loan]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = 风险资本融资贷款：20k // Venture Capital Funding Loan: 20k
    @description = 在GAP航空航天公司，我们照顾自己人。我们注意到您的资金有些紧张，在我们看到您陷入困境之前，我们想通过GAP风险资本基金向您的组织提供一笔贷款。我们相信您有能力扭转局面，所以如果您接受这个提议，我们认为您将能够从中受益。&br;&br;贷款金额：£ @/principal.Print() 资金。&br;&br;期限：@/period 天&br;&br;利息费用：@/posInterest% 或 £ @/interestPayment.Print() 资金。&br;&br;@/period 天后应付总额：£ @/posPayment.Print() 资金。&br;&br;此贷款在期限内免息。提前还款没有罚金。 // Here at GAP Aerospace, we take care of our own. We've noticed that you are running a little low on funds, and before we see you go under, we would like to offer your organization a loan from the GAP Venture Capital Fund. We believe in your ability to turn things around, so we think you will be able to benefit from this offer if you accept it.&br;&br;Loan Amount: £ @/principal.Print() funds.&br;&br;Term: @/period days&br;&br;Interest Charge: @/posInterest% or £ @/interestPayment.Print() funds.&br;&br;Total Due after @/period Days: £ @/posPayment.Print() funds.&br;&br;This loan is interest free for the duration of the term. There is no penalty for paying off this loan early.
    @synopsis = 如果您的组织需要，GAP航空航天公司愿意提供财务生命线。 // GAP Aerospace is offering your organization a financial lifeline if you so desire.
    @notes = 要提前还清贷款并避免利息费用，只需在@/period天结束前取消合同。 // To pay the loan off early and avoid the interest charge, simply cancel the contract before @/period days is up.
    @completedMessage = 您的£ @/principal.Print()贷款已还清，但由于您等待了超过@/period天才还款，产生了@/posInterest%的利息费用£ @/interestPayment.Print()。我们希望在此期间您能够使财务状况恢复正常！如果将来再次需要，我们随时在这里为您服务。 // Your loan of £ @/principal.Print() has been paid off, but with a @/posInterest% interest charge of £ @/interestPayment.Print() since you waited more than @/period days to pay us back. We hope you were able to get your financials back in order in the meantime! We'll be here if you need us again in the future.
    
    // PARAMETER节点汉化
    @PARAMETER[Duration],0
    {
        @preWaitText = 贷款期限： // Loan duration:
        @waitingText =  √ @/posPayment.Print() 到期日： // √ @/posPayment.Print() due on:
        @completionText = 您的贷款到期了！ // Your loan is due!
    }
}

