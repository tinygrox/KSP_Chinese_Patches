    @completedMessage = 部件转移完成。&br;&br;您的组织现在可以访问以下部件：&br;&br;- KT6A "小猫"涡轮螺旋桨发动机&br;&br;享受新部件吧！ // Part transfer complete.&br;&br;Your organization now has access to the following:&br;&br;- KT6A "Kitty" Turboprop Engine&br;&br;Enjoy the new part!
