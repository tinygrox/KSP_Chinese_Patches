@CONTRACT_TYPE[Wright-FirstFlight]:NEEDS[ContractPacks/GAP]:FOR[CNPatches]
{
    @title = 首次飞行！ // First Flight!
    @description = 恭喜！您已经掌握了飞行技术的基本原理！现在，证明您的知识并成为航空历史上的重要人物。&br;&br;准备一架飞机并使其首次飞行！ // Congratulations! You've mastered the basics of flight technology! Now, prove your knowledge and become an important figure in aviation history.&br;&br;Prepare an aircraft and make its first flight!
    @synopsis = 使用我们的"E型机翼连接器"和"KT6A小猫涡轮螺旋桨发动机"部件，建造并驾驶一架飞机进行首次飞行。 // Using our "Wing Connector Type E" and "KT6A Kitty Turboprop Engine" parts, construct and pilot an aircraft on its first flight.
    @notes = 您的飞机必须在地面上起飞，并且必须携带一名飞行员。 // Your aircraft must take off from the ground and must carry a pilot.
    @completedMessage = 成功！您已经在航空史上留下了印记。我们预计在不久的将来会有许多激动人心的进展。 // Success! You've made your mark in aviation history. We anticipate many exciting developments in the near future.
