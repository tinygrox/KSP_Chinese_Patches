    // BEHAVIOUR节点汉化
    @BEHAVIOUR[Dialog?Box]
    {
        @DIALOG_BOX:HAS[#parameter[RequestTakeoffDessertAirfield]]
        {
            @TEXT
            {
                @text = 甜点机场塔台：Kesca三六零，您已获准前往岛屿机场。离开甜点机场航向零八二，应答机编码零一一八。 // Dessert Airfield ATC: Kesca Three Six Zero, you are cleared to the Island Airfield. Depart the Dessert Airfield heading zero eight two, squawk zero one one eight.
            }
        }
        
        @DIALOG_BOX:HAS[#parameter[RequestLandingIsland]]
        {
            @TEXT
            {
                @text = 岛屿塔台：Kesca三六零，我们看到您正在接近。您已获准在岛屿机场着陆。风向三四零，风速五到十节。 // Island ATC: Kesca Three Six Zero, we have you on approach. You are cleared to land on the Island Airfield. Winds three-forty at five to ten.
            }
