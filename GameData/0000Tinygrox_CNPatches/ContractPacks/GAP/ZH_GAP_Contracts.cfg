        @DIALOG_BOX:HAS[#parameter[RequestTakeoffIsland]]
        {
            @TEXT
            {
                @text = 岛屿塔台：Kesca三六零，您已获准通过Kerman离场飞行计划前往太空中心机场。离开岛屿机场航向零九零，应答机编码零一一六。 // Island ATC: Kesca Three Six Zero, you are cleared to the Space Center airport via the Kerman departure flight plan. Depart the Island Airfield heading zero niner zero, squawk zero one one six.
            }
        }
        
        @DIALOG_BOX:HAS[#parameter[RequestLandingKSC]]
        {
            @TEXT
            {
                @text = KSC塔台：Kesca三六零，我们看到您正在接近。您已获准在二七跑道着陆。风向三四零，风速十到十五节。 // KSC ATC: Kesca Three Six Zero, we have you on approach. You are cleared to land on runway two seven. Winds three-forty at ten to fifteen.
            }
        }
        
        @DIALOG_BOX:HAS[#parameter[RequestTakeoffKSC]]
        {
            @TEXT
            {
                @text = KSC塔台：Kesca三六零，您已获准从零九跑道起飞前往甜点机场，航向二六二，应答机编码零二二七。 // KSC ATC: Kesca Three Six Zero, you are cleared to the Dessert Airfield depature on runway zero niner, heading two six two, squawk zero two two seven.
            }
        }
        
        @DIALOG_BOX:HAS[#parameter[RequestLandingDessertAirfield]]
        {
            @TEXT
            {
                @text = 甜点机场塔台：Kesca三六零，我们看到您正在接近。您已获准在甜点机场零一跑道着陆。风向一一零，风速十到十五节。 // Dessert Airfield ATC: Kesca Three Six Zero, we have you on approach. You are cleared to land on Dessert Airfield zero one. Winds one-ten at ten to fiften.
            }
        }
    }
}

