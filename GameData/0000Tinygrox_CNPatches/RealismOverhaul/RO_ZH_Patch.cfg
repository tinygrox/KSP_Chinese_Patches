// [源]: RO_ISS.cfg
@PART[ISS_FGB|ISS_FGB1]:AFTER[RealismOverhaul]
{
    @title = 国际空间站曙光号功能货舱
    @description = 曙光号，也称为功能货舱或FGB，是国际空间站首个发射的模块。在组装初期，功能货舱为国际空间站提供电力、存储、推进和导航。随着其他功能更专业的模块的发射和在轨组装，曙光号现在主要用于存储，包括加压舱内部和外部安装的燃料箱。曙光号是设计用于俄罗斯礼炮计划的TKS飞船的后代。名称曙光号意味着日出，被赋予功能货舱因为它象征着太空国际合作新时代的黎明。尽管它由俄罗斯公司建造，但归美国所有。
}

// [源]: RO_ISS.cfg
@PART[Mir_Core_Module]:AFTER[RealismOverhaul]
{
    @title = 和平号核心舱/国际空间站星辰号模块
    @description = 星辰号，也称为星辰号服务舱，是国际空间站（ISS）的一个组成部分。它是发射到空间站的第三个模块，提供了空间站的所有生命支持系统，其中一些在美国轨道段中得到补充，以及两名机组人员的生活区。它是空间站俄罗斯部分——俄罗斯轨道段的结构和功能中心。
}

