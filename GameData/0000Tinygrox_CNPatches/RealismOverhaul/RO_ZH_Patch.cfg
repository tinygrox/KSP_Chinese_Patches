    @description = 毕格罗宇航公司设计的最大居住舱。顾名思义，它拥有高达2100立方米的加压容积，是国际空间站总容积的两倍多。可舒适地容纳18名宇航员。添加至少十二吨水用于辐射屏蔽，以模拟深空配置，否则应保持在低地球轨道。
}

// [源]: RO_ISS.cfg
@PART[ISS_Z1]:AFTER[RealismOverhaul]
{
    @title = 国际空间站Z1桁架段
    @description = 第一个桁架段，Z1桁架，于2000年10月搭载STS-92发射升空。它包含控制力矩陀螺(CMG)组件、电线、通信设备以及两个设计用于中和空间站静电电荷的等离子体接触器。Z1桁架的另一个目的是作为“P6桁架和太阳能电池阵”的临时安装位置，直到在STS-120任务期间将其重新定位到P5桁架的末端。尽管不是主桁架的一部分，Z1桁架是国际空间站的第一个永久性格构结构，非常类似于梁，为未来添加空间站的主要桁架或骨干奠定了基础。
}

