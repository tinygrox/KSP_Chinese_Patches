// [源]: HabTech2\RO_HabTech2_modules.cfg
@PART[ht2_moduleColumbus]:AFTER[RealismOverhaul]
{
    @title = 国际空间站哥伦布号实验舱
    @description = 哥伦布号是国际空间站（ISS）的一个科学实验室，是欧洲空间局（ESA）对国际空间站做出的最大单一贡献。与和谐号和宁静号模块一样，哥伦布实验室由总部位于罗马的阿尔卡特阿莱尼亚太空公司在意大利都灵建造，涉及结构和热控系统。实验室的功能架构（包括软件）由德国不来梅的EADS设计，并在通过空客大白鲸运输机运往佛罗里达州肯尼迪航天中心（KSC）之前在那里集成。它于2008年2月7日由亚特兰蒂斯号航天飞机在STS-122任务中发射升空。设计使用寿命为十年。该模块由哥伦布控制中心控制，该中心位于德国航天运行中心，是德国航空航天中心的一部分，靠近德国慕尼黑的奥伯普法芬霍芬。
}

// [源]: HabTech2\RO_HabTech2_modules.cfg
@PART[ht2_moduleCupola]:AFTER[RealismOverhaul]
{
    @title = 国际空间站穹顶舱
    @description = 穹顶舱是欧洲空间局（ESA）建造的国际空间站（ISS）观测模块。其七个窗口用于进行实验、对接和地球观测。它于2010年2月8日由航天飞机任务STS-130发射升空，并连接到宁静号（节点3）模块。随着穹顶舱的安装，国际空间站的组装完成了85%。穹顶舱的80厘米（31英寸）窗口是太空中使用过的最大窗口。
}

// [源]: HabTech2\RO_HabTech2_modules.cfg
@PART[ht2_moduleDestiny]:AFTER[RealismOverhaul]
{
    @title = 国际空间站命运号实验舱
    @description = 命运号实验舱是国际空间站（ISS）上美国研究载荷的主要操作设施。它于2001年2月与团结号模块对接，并在五天内激活。命运号是美国国家航空航天局（NASA）自1974年2月天空实验室被废弃以来的第一个永久性轨道研究站。
}

