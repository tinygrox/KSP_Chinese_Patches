    @description = 用于连接集成桁架结构桁架段的对接端口，该结构包含国际空间站的大型太阳能电池阵和辐射器。
}

// [源]: RO_ISS.cfg
@PART[ISS?Truss?S0]:AFTER[RealismOverhaul]
{
    @title = 国际空间站S0桁架段
    @description = S0桁架（也称为中心集成桁架组件右舷0桁架）构成了空间站的中央骨干。它于2002年4月STS-110任务期间附着在命运号实验室模块的顶部。S0用于将电力输送到加压站模块，并将热量从模块传导到S1和P1桁架。
}

// [源]: RO_ISS.cfg
@PART[ISS?Truss?S1/P1]:AFTER[RealismOverhaul]
{
    @title = 国际空间站S1/P1桁架段
    @description = P1和S1桁架（也称为左舷和右舷侧热辐射器桁架）附着在S0桁架上，并包含用于运输加拿大臂2号和宇航员到空间站沿线工作站的推车。它们各自通过三个散热辐射器流动290公斤（637磅）的无水氨。S1桁架于2002年10月STS-112发射，P1桁架于2002年11月STS-113发射。
}

// [源]: RO_ISS.cfg
@PART[ISS?Truss?S3/P3]:AFTER[RealismOverhaul]
{
    @title = 国际空间站P4-P6/S4-S6段
    @description = 国际空间站的主要能源来源来自目前站上四个大型美国制造的光伏电池阵中的三个，有时被称为太阳能电池翼(SAW)。第一对电池阵附着在P6桁架段上，该段于2000年底STS-97任务期间发射并安装在Z1顶部。P6段于2007年11月STS-120任务期间重新定位到其最终位置，螺栓固定在P5桁架段上。第二对电池阵于2006年9月STS-115任务期间发射并安装，但直到2006年12月STS-116任务期间空间站进行电气重新布线后才供电。第三对电池阵于2007年6月STS-117任务期间安装。最后一对于2009年3月中旬搭载STS-119抵达。原计划通过俄罗斯建造的科学动力平台提供更多太阳能电力，但该平台被取消。
}

