// [源]: BornholioNuclear\PARTS\KIWI_A24.cfg
@PART[KIWIA24]:AFTER[RealismOverhaul]
{
    @title = LV-NKA24 "KIWI A24" 原子火箭发动机
    @description = “KIWI A”系列是一种较旧的132兆瓦反应堆，在所有测试运行中功率密度最低。大多数测试以失败告终，燃料元件破碎或测试设备故障，但学到了很多，液氢泵送技术的发展是一项重大成就。其核心能够启动两次。包括整体钨屏蔽，整个组件采用再生冷却。二次回路通过小型热机运行关机气体，以最小化燃料损失并提供基本交流发电机功率。此发动机应安装在距离最近燃料箱两到六米处。运行时，燃料应屏蔽任何乘员，乘员位置应距离发动机六到九米。额外屏蔽如水箱或高密度燃料可以稍微减少这个距离。所有后续美国核热火箭设计都基于此概念。此版本具有非常小的固定再生冷却喷管，面积膨胀比为24:1。喷管Ae/A*=24 燃烧室温度=2300K 理想比冲=874秒 反应堆功率=132兆瓦（热） 推重比=0.24 燃烧室压力=1415千帕 点火次数=2 包括整体阴影屏蔽的吨位：12.08吨
}

// [源]: BornholioNuclear\PARTS\KIWI_B48.cfg
@PART[KIWIB48]:AFTER[RealismOverhaul]
{
    @title = LV-NKB48 "KIWI B48" 原子火箭发动机
    @description = “KIWI B”系列是一种较旧的1100兆瓦反应堆，功率密度是A系列的十倍以上。早期大多数测试以失败告终，燃料元件破碎或测试设备故障，但学到了很多，先进涂层化学气相沉积和热管技术的发展。最终测试B4E运行平稳，甚至从冷条件重启。第一次Kiwi B测试使用气态氢运行，因为氢泵送和储存还处于起步阶段。其核心能够启动四次。包括整体钨屏蔽，整个组件采用再生冷却。二次回路通过小型热机运行关机气体，以最小化燃料损失并提供基本交流发电机功率。此发动机应安装在距离最近燃料箱三到六米处。运行时，燃料应屏蔽任何乘员，乘员位置应距离发动机八到十二米。额外屏蔽如水箱或高密度燃料可以稍微减少这个距离。此火箭代表了基本且保守的固体核心火箭设计。NERVA设计基于此概念。此版本具有固定再生冷却喷管，膨胀比为66:1。喷管Ae=66 燃烧室温度=2473K 理想比冲=864秒 反应堆功率=1166兆瓦（热） 推重比=2.04 燃烧室压力=3606千帕 点火次数=4 包括整体阴影屏蔽的吨位：13.76吨
}

