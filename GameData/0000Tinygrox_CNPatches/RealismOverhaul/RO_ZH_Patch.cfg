// [源]: TokamakIndustries\RO_Tokamak_Industries_Habitat.cfg
@PART[centrifugeSmall]:AFTER[RealismOverhaul]
{
    @title = 国际空间站离心机演示版
    @description = 这是来自鹦鹉螺-X设计研究的离心机缩小版，提议安装在国际空间站上以演示概念的可行性。仅在部分重力下足够容纳四人作为睡眠区。空间不足以站立，半径太小无法提供完整重力。相对较高的旋转速率很可能使整个体验非常令人恶心。尽管如此，对于长期任务的船员来说，仍可能带来显著的健康益处。
}

// [源]: TokamakIndustries\RO_Tokamak_Industries_Habitat.cfg
@PART[centrifugeXL]:AFTER[RealismOverhaul]
{
    @title = 鹦鹉螺-X离心机
    @description = 这是鹦鹉螺-X提案中离心机的完整尺寸版本。其可居住容积接近整个国际空间站的总和，足够为六名宇航员提供舒适的居住环境。尽管直径仍然太小，无法在可耐受的旋转速率下提供类似地球的完整重力，但轻松达到火星重力水平。
}

