// [源]: RO_ISS.cfg
@PART[ISS?PMA?Adapter]:AFTER[RealismOverhaul]
{
    @title = 国际空间站加压对接适配器
    @description = 国际空间站（ISS）使用三个加压对接适配器（PMAs）来连接具有不同对接机制的航天器和模块。前两个PMAs于1998年与团结号模块一起由STS-88发射。第三个于2000年由STS-92发射。
}

// [源]: RO_ISS.cfg
@PART[ISS?CBM?dockport]:AFTER[RealismOverhaul]
{
    @title = 国际空间站通用泊位机构
    @description = 通用泊位机构（CBM）是一种用于连接国际空间站所有非俄罗斯加压模块的泊位机构。它由波音公司在阿拉巴马州亨茨维尔的马歇尔太空飞行中心（MSFC）为美国国家航空航天局（NASA）合同开发。
}

// [源]: RO_ISS.cfg
@PART[UnityNode1]:AFTER[RealismOverhaul]
{
    @title = 国际空间站团结号（节点1）
    @description = 团结号连接模块是国际空间站的第一个美国制造组件。它呈圆柱形，有六个泊位位置（前、后、左舷、右舷、天顶和天底），便于连接其他模块。团结号由波音公司在阿拉巴马州亨茨维尔的马歇尔太空飞行中心的制造工厂为NASA建造。有时被称为节点1，团结号是三个连接模块中的第一个；另外两个是和谐号和宁静号。
}

// [源]: RO_ISS.cfg
@PART[ISS?Destiny]:AFTER[RealismOverhaul]
{
    @title = 国际空间站命运号
    @description = 命运号模块是国际空间站（ISS）上美国研究载荷的主要操作设施。它于2001年2月与团结号模块对接，并在五天内激活。自1974年2月天空实验室被废弃以来，命运号是NASA的第一个永久运行轨道研究站。
}

// [源]: RO_ISS.cfg
@PART[ISS?Node2]:AFTER[RealismOverhaul]
{
    @title = 国际空间站和谐号节点舱（节点2）
    @description = 和谐号，也称为节点2，是国际空间站的“实用枢纽”。该枢纽包含四个机架，提供电力、电子数据，并通过其六个通用停泊机制（CBMs）作为其他几个组件的中央连接点。和谐号为空间站增加了2,666立方英尺（75.5立方米）的生活空间，增加了近20%，从15,000立方英尺（420立方米）增加到17,666立方英尺（500.2立方米）。和谐号的成功安装意味着从NASA的角度来看，空间站是“美国核心完成”。和谐号于2007年10月23日搭载航天飞机任务STS-120成功发射升空。在暂时连接到团结号节点舱的左侧后，于2007年11月14日移动到命运号实验室前端的永久位置。
}

// [源]: RO_ISS.cfg
@PART[ISS?Columbus]:AFTER[RealismOverhaul]
{
    @title = 国际空间站哥伦布号实验舱
    @description = 哥伦布号是一个科学实验室，是国际空间站（ISS）的一部分，也是欧洲空间局（ESA）对国际空间站的最大单一贡献。与和谐号和宁静号模块一样，哥伦布实验室由总部位于罗马的阿尔卡特阿莱尼亚空间公司在意大利都灵建造，涉及结构和热控制。实验室的功能架构（包括软件）由德国不来梅的EADS设计，并在由空客大白鲸运送到佛罗里达州肯尼迪航天中心（KSC）之前在那里集成。它于2008年2月7日搭载航天飞机亚特兰蒂斯号在STS-122任务中发射。设计运行寿命为十年。该模块由哥伦布控制中心控制，位于德国航天操作中心，是德国航空航天中心在慕尼黑附近奥伯普法芬霍芬的一部分。
}

// [源]: RO_ISS.cfg
@PART[ISS_JEM?PM]:AFTER[RealismOverhaul]
{
    @title = 国际空间站希望号（JEM加压舱）
    @description = 日本实验舱（JEM），也称为希望号（Kibo），是日本宇宙航空研究开发机构（JAXA）为国际空间站（ISS）开发的日本科学模块。它是国际空间站最大的单一模块。该模块的前两个部分在航天飞机任务STS-123和STS-124中发射。第三和最终组件在STS-127中发射。加压舱（PM）是连接到节点2模块左舷舱门的核心组件。它呈圆柱形，包含二十三个国际标准有效载荷机架（ISPR），其中十个专门用于科学实验，其余十三个专门用于希望号的系统和存储。机架沿模块的四壁以6-6-6-5放置。JEM-PM的末端有一个气闸和两个窗口舱口。暴露设施、实验后勤模块和远程操纵系统都连接到加压舱。希望号也是空间站上举行许多新闻发布会的地点。
}

// [源]: RO_ISS.cfg
@PART[ISS_JEM?ELM-PS]:AFTER[RealismOverhaul]
{
    @title = 国际空间站JEM实验后勤舱加压段
    @description = 日本实验后勤舱加压段（ELM-PS），也称为JLP，是PM的加压附加部分。该模块是一个存储设施，为实验有效载荷、样品和备用物品提供存储空间。
}

// [源]: RO_ISS.cfg
@PART[ISS?Quest]:AFTER[RealismOverhaul]
{
    @title = 国际空间站寻求号联合气闸舱
    @description = 寻求号联合气闸舱，以前称为联合气闸模块，是国际空间站的主要气闸舱。寻求号设计用于容纳舱外机动单元（EMU）太空服和奥兰太空服进行太空行走。该气闸舱于2001年7月14日在STS-104任务中发射。在寻求号安装之前，使用奥兰服的俄罗斯太空行走只能从星辰号服务模块进行，而使用EMU的美国太空行走只有在航天飞机对接时才可能。2001年9月16日，皮尔斯号对接舱的到来提供了另一个可以进行奥兰太空行走的气闸舱。
}

