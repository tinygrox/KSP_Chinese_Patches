// [源]: NearFutureTechnologies\RO_NearFuture_Electrical_Nuclear.cfg
@PART[nfe-reactor-25-2]:AFTER[RealismOverhaul]
{
    @title = NASA SNAP-50 35 千瓦电力核反应堆
    @description = SNAP-50 是一个独立于主计划的开发性反应堆项目。在声名狼藉的冥王星计划下为航空核推进计划开发，普惠公司在航空核推进计划结束后将该反应堆提供给NASA。SNAP-50 的优势在于其高转换效率和高功率水平。但由于兰金循环转换，它存在单点故障概率较高和重量增加的缺点。这是一个缩小版设计，适用于空间站或核电力拖船。设计寿命为全功率下2年。
}

