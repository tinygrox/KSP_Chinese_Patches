// [源]: FarFutureTechnologies\FFT_RO.cfg
@PART[fft-fission-orion-5-1]:AFTER[RealismOverhaul]
{
    @title = 8米猎户座驱动
    @description = 传奇的猎户座核脉冲驱动，利用核成形装药射击重型推进板，以实现极高的推力和性能。这是后来的提案之一，于1960年代中期提交给空军，作为原始4000吨猎户座太空战舰提案的缩小版、性能较低的版本。这将允许它在启动引擎前由土星五号或其他大型火箭运送到亚轨道轨迹，降低相关风险。它也曾提供给NASA，用于在数月内运送8名宇航员往返火星。尽管使用常规炸药进行了小规模测试，据称还测试了全尺寸核脉冲单元，但开发这种驱动的政治影响和禁止核试验条约导致其于1965年左右被取消。不建议在大气中使用。
}

