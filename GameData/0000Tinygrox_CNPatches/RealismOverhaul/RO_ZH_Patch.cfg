// [源]: HabTech2\RO_HabTech2_modules.cfg
@PART[ht2_moduleHarmony]:AFTER[RealismOverhaul]
{
    @title = 国际空间站和谐号/宁静号（节点2/3）
    @description = 和谐号/宁静号，分别也称为节点2和节点3。节点2提供了四个站上科学实验设施之间的通道：美国命运号实验室、日本希望号实验舱、欧洲哥伦布号实验室和离心机住宿舱。节点3包含先进的生命支持系统和锻炼设备。这些系统将回收废水供乘员使用，并为乘员生成呼吸用氧。
}

// [源]: HabTech2\RO_HabTech2_modules.cfg
@PART[ht2_moduleJEMlogistics]:AFTER[RealismOverhaul]
{
    @title = 国际空间站日本实验舱ELM-PS（实验后勤舱加压段）
    @description = 日本实验后勤舱加压段（ELM-PS），也称为JLP，是加压舱的一个附加部分。该模块是一个存储设施，为实验载荷、样品和备用物品提供存储空间。
}

// [源]: HabTech2\RO_HabTech2_modules.cfg
@PART[ht2_moduleKibo]:AFTER[RealismOverhaul]
{
    @title = 国际空间站希望号（日本实验舱加压舱）
    @description = 日本实验舱（JEM），也昵称为希望号（Kibo），是由JAXA开发的国际空间站（ISS）日本科学舱。它是国际空间站最大的单个模块。该模块的前两个部分由航天飞机任务STS-123和STS-124发射。第三个也是最后的组件由STS-127发射。加压舱（PM）是连接到节点2模块端口舱门的核心组件。它呈圆柱形，包含二十三个国际标准载荷架（ISPR），其中十个专用于科学实验，其余十三个专用于希望号的系统和存储。这些架子沿模块的四壁以6-6-6-5布置。JEM-PM的末端有一个气闸和两个窗口舱门。暴露设施、实验后勤舱和远程操纵系统都连接到加压舱。希望号也是空间站上举行许多新闻发布会的场所。
}

// [源]: HabTech2\RO_HabTech2_modules.cfg
@PART[ht2_moduleQuest]:AFTER[RealismOverhaul]
{
    @title = 国际空间站寻求号联合气闸
    @description = 寻求号联合气闸，以前称为联合气闸模块，是国际空间站的主要气闸。寻求号设计用于同时支持舱外机动单元（EMU）航天服和海鹰（Orlan）航天服的太空行走。该气闸于2001年7月14日由STS-104发射。在寻求号安装之前，使用海鹰服的俄罗斯太空行走只能从星辰号服务舱进行，而使用EMU的美国太空行走只有在航天飞机对接时才可能进行。2001年9月16日码头号对接舱的到来提供了另一个可以进行海鹰服太空行走的气闸。
}

// [源]: HabTech2\RO_HabTech2_modules.cfg
@PART[ht2_moduleUnity]:AFTER[RealismOverhaul]
{
    @title = 国际空间站团结号（节点1）
    @description = 团结号连接模块是国际空间站第一个美国制造的组件。它呈圆柱形，有六个对接位置（前、后、左舷、右舷、天顶和底点），便于与其他模块连接。团结号由波音公司在阿拉巴马州亨茨维尔马歇尔太空飞行中心的制造设施为NASA建造。有时称为节点1，团结号是三个连接模块中的第一个；另外两个是和谐号和宁静号。
}

// [源]: HabTech2\RO_HabTech2_truss.cfg
@PART[ht2_truss_S0]:AFTER[RealismOverhaul]
{
    @title = 国际空间站S0桁架段
    @description = S0桁架（也称为中心集成桁架组件右舷0桁架）构成了空间站的中央骨干。它于2002年4月在STS-110任务期间安装在命运号实验舱的顶部。S0用于将电力输送到加压站模块，并将热量从模块传导到S1和P1桁架。
}

// [源]: HabTech2\RO_HabTech2_truss.cfg
@PART[ht2_truss_S1]:AFTER[RealismOverhaul]
{
    @title = 国际空间站S1/P1桁架段
    @description = P1和S1桁架（也称为端口和右舷侧热散热器桁架）连接到S0桁架，并包含用于运输加拿大机械臂2号和宇航员到空间站工作点的运输车。它们各自通过三个散热器流动290公斤（637磅）的无水氨。S1桁架于2002年10月在STS-112任务中发射，P1桁架于2002年11月在STS-113任务中发射。
}

