// [源]: HabTech2\RO_HabTech2_truss.cfg
@PART[ht2_solarArray_duo]:AFTER[RealismOverhaul]
{
    @title = 国际空间站P4-P6/S4-S6桁架段
    @description = 国际空间站的主要能源来自站上目前四个大型美国制造的光伏阵列中的三个，有时被称为太阳能阵列翼（SAW）。第一对阵列安装在P6桁架段上，于2000年末在STS-97任务期间发射并安装在Z1顶部。P6段于2007年11月在STS-120任务期间重新定位到其最终位置，螺栓固定在P5桁架段上。第二对阵列于2006年9月在STS-115任务期间发射并安装，但直到2006年12月STS-116任务期间空间站进行电气重新布线后才供电。第三对阵列于2007年6月在STS-117任务期间安装。最后一对于2009年3月中旬在STS-119任务期间到达。原本计划通过俄罗斯建造的科学动力平台提供更多太阳能，但该平台被取消。
}

// [源]: HabTech2\RO_HabTech2_truss.cfg
@PART[ht2_truss_Z1|ht2_truss_Z1_v2]:AFTER[RealismOverhaul]
{
    @title = 国际空间站Z1桁架段
    @description = 第一段桁架，Z1桁架，于2000年10月由STS-92发射升空。它包含控制力矩陀螺仪(CMG)组件、电气线路、通信设备，以及两个等离子体接触器，用于中和空间站的静电荷。Z1桁架的另一个目的是作为“P6桁架和太阳能阵列”的临时安装位置，直到在STS-120任务中将其重新定位到P5桁架的末端。虽然不属于主桁架的一部分，但Z1桁架是国际空间站的第一个永久性网格结构，非常像梁，为未来添加空间站的主要桁架或骨干奠定了基础。
}

