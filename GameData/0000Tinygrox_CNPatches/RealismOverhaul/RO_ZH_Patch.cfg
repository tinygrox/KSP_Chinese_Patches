// [源]: RO_Horizon_Aeronautics_Zenit.cfg
@PART[HA3SLRD171]:AFTER[RealismOverhaul]
{
    @title = RD-171
    @description = RD-170和RD-171发动机由4个燃烧室、1个涡轮泵和2个气体发生器组成，同时开发，区别在于RD-170使用单平面摆动，用于能源号运载火箭的捆绑助推器，而RD-171使用双平面摆动，用于天顶号运载火箭的第一级。RD-171通常可以使用波纹管摆动到6度，但在测试中达到了8-10度。燃烧室条件为300大气压和400摄氏度的富氧气体混合物——非常危险的条件。RD-170很难证明，许多设计师认为它不可能实现。第一级捆绑助推器在降落伞下回收并返回拜科努尔进行研究。该发动机设计为可重复使用10次，但测试显示它们可以承受20次点火。
}

