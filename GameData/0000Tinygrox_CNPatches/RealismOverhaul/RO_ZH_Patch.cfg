    @description = 即将推出的毕格罗BA330充气式居住舱。顾名思义，它具有330立方米的加压容积。可容纳6人，并提供30天的补给。添加几吨水用于辐射屏蔽，以模拟深空配置（否则仅适用于低地球轨道）。
}

// [源]: RO_PorkWorks_HabitatPack.cfg
