    @description = “福博斯2”系列是一个5000兆瓦反应堆。大多数测试成功，证明新涂层工作良好，并成为当时地球上最强大的反应堆堆芯。其堆芯能够启动八次。包含一个整体式钨硼复合屏蔽，整个组件采用再生冷却。一个次级回路将关闭气体通过一个小型热机运行，以最小化燃料损失并提供基本交流发电机功率。此发动机应安装在距离最近燃料箱三到六米处。燃料应屏蔽任何乘员，且运行时的乘员位置应距离发动机十到十五米。额外的屏蔽，如水箱或高密度燃料，可以稍微减少这个距离。这款火箭代表了一个更强大、能力更强系列火箭，推重比近6。此版本采用固定再生冷却喷管，膨胀比为100:1。喷管膨胀比=100 燃烧室温度=2245K 理想比冲=889秒 反应堆功率=4182兆瓦(热) 推重比=5.48 燃烧室压力=3825千帕 点火次数=8 包括整体阴影屏蔽的吨位：16.97吨
