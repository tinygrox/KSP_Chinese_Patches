@PART[SPO_Orion5Meter]:AFTER[RealismOverhaul]
{
    @title = 美国空军10米猎户座核脉冲推进器
    @description = 传奇的猎户座核脉冲推进器，利用核定向装药向重型推进板射击，以实现极高的推力和性能。这是后来的提案之一，在1960年代中期向空军提出，作为原始4000吨猎户座太空战舰提案的缩小版、性能较低的版本。这将允许它由土星五号或其他大型火箭携带到亚轨道轨迹，然后再启动引擎，从而降低风险。它还曾向NASA提议，用于在几个月内将8名乘员送往火星并返回。尽管使用常规炸药进行了缩小比例测试，并且据称测试了全尺寸核脉冲单元，但开发这种推进器的政治影响以及《核试验禁止条约》导致其在1965年左右被取消。不建议在大气中使用。
}

// [源]: Orion\StockishOrionDrive.cfg
@PART[SPO_Medusa50Meter]:AFTER[RealismOverhaul]
{
    @title = 100米美杜莎核脉冲推进器
    @description = 传奇的美杜莎核脉冲推进器，利用核定向装药向轻质帆射击，以实现极高的推力和性能。使用由缆绳悬吊在飞行器前方的帆，使得结构更简单且具有减震机制。帆的轻质特性还允许它更大，从核脉冲单元中提取更多性能，并可以使用更大的间距，从而允许使用更大的脉冲单元。不建议在大气中使用。
}

