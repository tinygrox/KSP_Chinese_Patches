    @description = “福博斯1”系列是一个1500兆瓦反应堆。早期大多数测试由于泵送或测试设备故障而失败，但学到了很多，并发展了先进涂层、化学气相沉积和更轻的材料。其堆芯能够启动四次。包含一个整体式钨硼复合屏蔽，整个组件采用再生冷却。一个次级回路将关闭气体通过一个小型热机运行，以最小化燃料损失并提供基本交流发电机功率。此发动机应安装在距离最近燃料箱三到六米处。燃料应屏蔽任何乘员，且运行时的乘员位置应距离发动机八到十二米。额外的屏蔽，如水箱或高密度燃料，可以稍微减少这个距离。这款火箭代表了一个更强大、能力更强系列火箭的开端。此版本采用固定再生冷却喷管，膨胀比为50:1。喷管膨胀比=50 燃烧室温度=2255K 理想比冲=881秒 反应堆功率=1500兆瓦(热) 推重比=3.33 燃烧室压力=3772千帕 点火次数=4 包括整体阴影屏蔽的吨位：9.14吨
