    @description = 材料和制造技术的突破使工程师能够设计出一种超轻量六边形卫星平台，成本低廉，能将探索推向新高度。该核心采用模块化设计，带有插槽，可容纳各种扩展，如控制系统、电气系统、热控系统、实验舱等。<#ef7b06> 作者注：为你的飞行器添加先驱者10/11恒星参考组件以获得额外的SAS模式。</color>
}

// [源]: Bluedog_DB\RO_BDB_Pioneer.cfg
@PART[bluedog_Pioneer_HGA]:AFTER[RealismOverhaul]
{
    @title = 先驱者10/11高增益天线
    @description = 专为先驱者10/11航天器设计的大型高增益碟形天线（及中增益天线），重量相对于其尺寸非常轻。擅长远距离传输，但以传输速度为代价。包含集成RCS推进器和两个太阳传感器，提供少量SAS控制。配备多个尾部安装的微流星体检测面板。
}

