// [源]: BornholioNuclear\PARTS\RD-0410NTR.cfg
@PART[RD0410MID]:AFTER[RealismOverhaul]
{
    @title = RD-0410 NTR “RD-0410 46” 原子火箭发动机
    @description = RD-0410是一款苏联核热火箭发动机，从1965年到1994年开发，使用液氢推进剂。该发动机在塞米巴拉金斯克试验场进行了地面测试，并被纳入库尔恰托夫1994年火星载人任务提案。其慢化剂和燃料与美国设计大不相同，据传燃料的金属碳化物版本在1990年代初能达到高达3500K而不熔化。使用庚烷减少碳化物的氢腐蚀对功能至关重要（约1%）。首次运行测试发生在1985年。一些俄罗斯资料列出其为双模式，不仅使用氢气，还使用无添加剂的液甲烷。在SNTP计划期间，美国试图从俄罗斯获取MC燃料，但计划购买失败。与美国设计相比，该发动机结构非常厚重，并采用四叶螺旋燃料棒，以消除棒破裂时燃料喷射的风险。此设计使用短再生冷却喷管，旨在作为上面级。设计参数：喷管膨胀比=46 燃烧室温度=2700K 理想比冲=972秒 反应堆功率=173兆瓦(热) 推重比=1.73 燃烧室压力=4000千帕 点火次数=10 包括整体阴影屏蔽的吨位：2吨。在甲烷模式下，喷管略微加长12厘米并略微扩大。喷管膨胀比=46 燃烧室温度=2700K 理想比冲=467秒 反应堆功率=173兆瓦(热) 推重比=3.56 燃烧室压力=4800千帕 点火次数=10 包括整体阴影屏蔽的吨位：2吨
}

// [源]: BornholioNuclear\PARTS\SNTP_PFE.cfg
@PART[SNTPPFE100]:AFTER[RealismOverhaul]
{
    @title = LV-NSNTP-PFE100 “部分流膨胀循环空间核热推进” 原子火箭发动机
    @description = “SNTP-PFE”系列是一个1000兆瓦反应堆。该反应堆是一个粒子床，使用金属碳化物涂覆的铀颗粒嵌入石墨棒中，氢气通过其中。这使得功率密度高达40兆瓦/升。其堆芯能够启动五次。包含一个整体式钨硼氢化锂复合屏蔽，整个组件采用再生冷却。一个次级回路将关闭气体通过一个小型热机运行，以最小化燃料损失并提供基本交流发电机功率。此发动机应安装在距离最近燃料箱三到六米处。燃料应屏蔽任何乘员，且运行时的乘员位置应距离发动机十到十五米。额外的屏蔽，如水箱或高密度燃料，可以稍微减少这个距离。这款火箭就其尺寸而言具有令人印象深刻的参数（喷管膨胀比=100 燃烧室温度=2720K 理想比冲=991秒 反应堆功率=1054兆瓦(热) 推重比=13.94 燃烧室压力=6800千帕 点火次数=5 包括整体阴影屏蔽的吨位：1.504吨）喷管为固定烧蚀冷却纤维缠绕碳-碳设计。
