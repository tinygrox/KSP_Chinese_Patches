// [源]: KWRocketry\RO_KWRocketry_Solids.cfg
@PART[KWsrbGlobeI]:AFTER[RealismOverhaul]
{
    @title = 卡斯托尔4A
    @description = 卡斯托尔4A是在第一代德尔塔II型运载火箭的6000系列上引入的，通过用更高能量的端羟基聚丁二烯（HTPB）替代聚丁二烯丙烯酸（PBAA），提供了改进的推力和比冲。这与加长的第一级（超扩展长箱体Thor）以及回归更高效的6-3固体火箭发动机点火序列相结合，使得德尔塔的性能相比3000系列提高了11%。卡斯托尔4A从1989年到1993年在德尔塔II上使用，之后被GEM 40取代。这些助推器也在1993年至2004年间用于阿特拉斯IIAS。燃烧时间53秒。
}

// [源]: KWRocketry\RO_KWRocketry_Solids.cfg
@PART[KWsrbGlobeI]:AFTER[RealismOverhaul]
{
    @title = 卡斯托尔4
    @description = 卡斯托尔4是作为雅典娜H导弹的第二级开发的，首次飞行于1971年。后来被适配用于取代德尔塔的卡斯托尔2助推器，将GTO运载能力从1593磅（723千克）提高到近2000磅（900千克）。这次升级部分由RCA全球通信公司资助，其新的1914磅（868千克）Satcom商业卫星对德尔塔来说太重，但对阿特拉斯来说又太轻。由此产生的德尔塔3000系列于1975年发射，是第一个采用交错助推器分级序列的型号。先前的德尔塔运载器以6-3序列点燃发动机，然后一次性抛弃所有固体火箭发动机。更重且燃烧时间更长的卡斯托尔4要求在地面点燃的发动机在耗尽后立即抛弃以减少死重。早期发射使用效率较低的5-4序列以减少加速度，但在80年代初德尔塔加强后回归了6-3序列。
}

