{
    @title = 国际空间站莱昂纳多永久多功能模块（PMM）
    @description = 莱昂纳多永久多功能模块（PMM）是国际空间站的一个模块。它于2011年2月24日由航天飞机STS-133任务搭载升空，并于3月1日安装。莱昂纳多主要用于在国际空间站上存储备件、供应品和废物，这些物品目前分散存储在空间站的多个不同位置。莱昂纳多PMM在2011年之前是一个多功能后勤模块（MPLM），但被改装成当前配置。它原本是三个用于通过航天飞机向国际空间站运送货物的MPLM之一。该模块以意大利博学者莱昂纳多·达·芬奇命名。
}

// [源]: RO_ISS.cfg
@PART[ISS_Cupola]:AFTER[RealismOverhaul]
{
    @title = 国际空间站穹顶舱
    @description = 穹顶舱是由欧洲空间局（ESA）建造的国际空间站观测模块。它的七个窗口用于进行实验、对接和地球观测。它于2010年2月8日由航天飞机STS-130任务发射，并连接到宁静号（节点3）模块。随着穹顶舱的安装，国际空间站的组装完成了85%。穹顶舱的80厘米（31英寸）窗口是太空中使用过的最大窗口。
}

// [源]: RO_ISS.cfg
@PART[ISS_Pirs]:AFTER[RealismOverhaul]
{
    @title = 国际空间站皮尔斯对接舱
    @description = 皮尔斯（码头）舱是原计划用于国际空间站的两个俄罗斯对接舱之一。皮尔斯舱于2001年8月发射。它为国际空间站提供了一个用于联盟号和进步号飞船的对接端口，并允许宇航员使用俄罗斯奥兰太空服进行太空行走的出入口。
}

// [源]: RO_ISS.cfg
@PART[ISS_Poisk]:AFTER[RealismOverhaul]
{
    @title = 国际空间站泊伊斯克对接模块（MRM 2）
    @description = 泊伊斯克（搜索）号，也称为小型研究模块2（MRM 2），是国际空间站的一个对接模块。它的原名是对接模块2，因为它几乎与皮尔斯对接舱相同。泊伊斯克号于2009年添加，是自2001年以来俄罗斯对国际空间站的第一个主要增补。
}

// [源]: RO_ISS.cfg
@PART[ISSdockingmodule]:AFTER[RealismOverhaul]
{
    @title = 国际空间站拉斯维特对接模块（MRM-1）
    @description = 拉斯维特（黎明）号，也称为小型研究模块1（MRM-1），曾被称为对接货运模块（DCM），是国际空间站（ISS）的一个组件。该模块的设计类似于1995年STS-74任务发射的和平号对接模块。拉斯维特号主要用于货物存储，并作为来访飞船的对接端口。它于2010年5月14日由航天飞机亚特兰蒂斯号在STS-132任务中运往国际空间站，并于5月18日连接到国际空间站。连接拉斯维特号与国际空间站的舱门于5月20日首次打开。2010年6月28日，联盟TMA-19飞船首次与该模块对接。
}

