@PART[BDB-Transtage-RO]:AFTER[RealismOverhaul]
{
    @title = 转移级
    @description = 航空电子设备、燃料箱和发动机全部集成在一个整洁的包裹中！姿态控制推力器需另购。氧化剂和液体燃料并非以椭球形燃料箱堆叠在一起，而是位于发动机模块两侧向下延伸的长胶囊中。这使得该级在更短的包裹中拥有更好的总体燃料容量。推进由两台升级的航空喷气公司AJ10-118发动机提供。虽然它缺乏其他上面级的原始性能，但非常适合将卫星送入精确或多重轨道。曾用于泰坦III火箭的多个变体。
}

