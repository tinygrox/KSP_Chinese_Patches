    @description = 2015年，联合发射联盟（ULA）宣布与轨道ATK公司签订合同，开发GEM 63作为AJ-60A的直接替换品，并将在2018年底取代航空喷气洛克达因公司，成为宇宙神5号的固体火箭发动机供应商。GEM 63将比用于德尔塔4号的GEM 60固体火箭发动机更大，且不配备推力矢量控制。与AJ-60A一样，使用四米整流罩的发射可以配备最多三个助推器，而使用五米整流罩时最多可使用五个助推器。
}

