@PART[PEWEE100]:AFTER[RealismOverhaul]
{
    @title = LV-NPW100 “皮威100” 原子火箭发动机
    @description = “皮威”系列是一个较小的572兆瓦反应堆，在所有漫游车测试中具有最高的功率密度。它还记录了测试中的最高比冲评级，为901秒。其堆芯能够启动多达12次。包含一个整体式钨硼复合屏蔽，整个组件采用再生冷却。一个次级回路将关闭气体通过一个小型热机运行，以最小化燃料损失并提供基本交流发电机功率。此发动机应安装在距离最近燃料箱三到六米处。燃料应屏蔽任何乘员，且运行时的乘员位置应距离发动机九到十二米。额外的屏蔽，如水箱或高密度燃料，可以稍微减少这个距离。大多数现代NASA研究反应堆，如BNTR，都源自这个测试反应堆。此版本采用固定再生冷却喷管。喷管膨胀比=100 燃烧室温度=2750K 理想比冲=998秒 反应堆功率=572兆瓦(热) 推重比=5.07 燃烧室压力=4344千帕 点火次数=12 包括整体阴影屏蔽的吨位：2.23吨
}

