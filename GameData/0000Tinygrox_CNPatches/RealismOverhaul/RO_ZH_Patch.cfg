// [源]: RO_PorkWorks_HabitatPack.cfg
@PART[centrifuge1]:AFTER[RealismOverhaul]
{
    @title = 国际空间站离心机演示舱
    @description = 来自鹦鹉螺-X设计研究的离心机缩小版，提议安装在国际空间站以演示该概念的可行性。仅足够作为4人在部分重力下的睡眠舱。空间不足以站立，半径太小无法提供完全重力。相对较高的旋转速率很可能使整个体验非常令人作呕。尽管如此，对于长期任务的乘员来说，仍可能带来显著的健康益处。
}

// [源]: RO_PorkWorks_HabitatPack.cfg
@PART[centrifugeXL]:AFTER[RealismOverhaul]
{
    @title = 鹦鹉螺-X离心机
    @description = 鹦鹉螺-X提案中的全尺寸离心机版本。其可居住容积接近整个国际空间站的总和，足够为六名宇航员提供舒适的居住环境。尽管直径仍然太小，无法在可耐受的旋转速率下提供类似地球的完全重力，但火星重力水平很容易实现。
}

// [源]: RO_PorkWorks_HabitatPack.cfg
@PART[inflato1]:AFTER[RealismOverhaul]
