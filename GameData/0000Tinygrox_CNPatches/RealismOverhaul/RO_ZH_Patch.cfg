    @description = 国际空间站（ISS）使用三个加压对接适配器（PMA）来连接具有不同对接机制的航天器和模块。前两个PMA于1998年与团结号模块一起由STS-88任务发射升空。第三个于2000年由STS-92任务发射。
}

