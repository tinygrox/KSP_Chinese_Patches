		//Description
		#AARS_AcceptOil_1 = Engineers insist this isn't a modified product of Vodka's brewing equipment, but apparently, they forgot to erase some words on the tube.
		#AARS_AcceptOil_2 = This stuff has terrible sawteeth and a deep dark hole. Engineers say these designs can enable it to be stealth from radar, that only means after disintegration. And it has high loading speed.
		#AARS_AcceptOil_3 = This time engineers not only erased the text on the tube, but also wrote some new texts, and they also added two lids so that it will not be broken by high speed.
		#AARS_AcceptOil_4 = Engineers find some longer tube for making a probe, they think it can be used on helicopters, so that the hose will not be accidentally cut off.
		#AARS_AcceptOil_5 = Type-D's scalable design makes the engineers realize that now we can have aerial refueling with a larger helicopter. "We absolutely didn't cut a flagpole," said the project manager.
		#AARS_AcceptOil_6 = This improved version removed the sawtooth design since many kermans were afraid of it. But it still has high loading speed.
		#AARS_AcceptOil_Mk1 = "We need some more beautiful Fuel Port," said a worker, and then there is this stuff. And it has high loading speed, beautiful and practical.
		#AARS_AcceptOil_Mk1A10 = An unnamed Acea Kerman customized this terrible nose, it has Radar Warning Receiver, Wing Commander, AI Pilot, and a huge 30mm ammunition box. It Also has a terrible shark face and high loading speed. Warranty void if used with no BDA.
		#AARS_AcceptOil_Mk2 = "We need some more beautiful Fuel Port, and it has to be Mk2 size," said another worker, and then there is this stuff. And it has high loading speed, beautiful and practical.
		#AARS_AcceptOil_Mk2B2 = This flip structure isn't just to make it look more cooler, engineers say this design can enable it to be stealth from radar. And it has high loading speed.
		#AARS_GrantOil_1 = This stuff supports higher fuel loading speed! Inspired by Kesla Inc.'s automated car charging equipment. "Very cool,"said the project manager.
		#AARS_GrantOil_2 = Modern stealth design, and supports higher fuel loading speed. Koeing Inc. produced.
		#AARS_GrantOil_3 = The contradiction from the Air Force and the Navy has finally been resolved, that is this.
		#AARS_DrogueModule = Project manager insist this isn't a modified product of an umbrella, it is small equipment, and has a petals-unfolded-like drogue.
		#AARS_DroguePod = A pod which is definitely not converted from a drop tank. It has a petals-unfolded-like drogue, some indicator lights, and a Ram Air Turbine for providing electricity and pressure to pump fuel.
		#AARS_DroguePod2 = A pod which is definitely not converted from a drop tank, it has a petals-unfolded-like drogue and a Ram Air Turbine for providing electricity and pressure to pump fuel.
		#AARS_DroguePod3 = Type-C is converted from Type-A, smaller, lighter, it can even mount on the end of the wing.
		#AARS_DroguePod4 = When your teammates do not have fuel, you'd better hope that the Type-D buddy refueling pod didn't fall off from the belly.
		#AARS_DroguePod5 = This buddy refueling pod has some indicator lights, even at night you also can have aerial refueling.
		#AARS_DroguePod6 = The "Really Cool Conformal Buddy Refueling Pod With Indicator Light" is a new invention of the engineer, you also can call it "R.C.C.B.R.P.W.I.L.".
		#AARS_AARSDroptank1 = Some times, using a retro style drop tank to decorate your fighter is also a good choice. Warranty void if careless start splitter.
		#AARS_AARSDroptank2 = A large tank, representing more fuel. Warranty void if careless start splitter.
		#AARS_AARSDroptank3 = Another large tank, but longer then the other one. Warranty void if careless start splitter.
		#AARS_AARSDroptank4 = This drop tank doesn't has splitter, it can even mount on the end of the wing, and is also has a probe.
